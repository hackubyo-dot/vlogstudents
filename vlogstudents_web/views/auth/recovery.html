<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - RECOVERY VIEW v51.0.0
 * PROTOCOLO DE RESTAURAÇÃO DE IDENTIDADE | FIDELITY DESIGN 1:1
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Especificações Visuais:
 * - Background: Deep Black (#000000)
 * - Accent: Lime Neon (#CCFF00)
 * - Header: Barra superior com título "Recuperação" centralizado.
 * - Spacing: Calibragem 1:1 com a imagem de referência.
 * ============================================================================
-->

<div id="recovery-view-container" class="container-fluid min-vh-100 d-flex flex-column p-0">
    
    <!-- 1. BARRA SUPERIOR (HEADER FIDELITY) -->
    <header class="fidelity-top-bar d-flex align-items-center px-4 animate__animated animate__fadeIn">
        <a href="#/auth/login" class="back-arrow-link">
            <i class="fas fa-chevron-left"></i>
        </a>
        <h2 class="top-bar-title m-0 flex-grow-1 text-center">Recuperação</h2>
        <div style="width: 20px;"></div> <!-- Spacer para centralizar o texto -->
    </header>

    <!-- 2. CONTEÚDO PRINCIPAL (CENTERED) -->
    <div class="row justify-content-center flex-grow-1 align-items-center px-4">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">

            <!-- PASSO 1: SOLICITAR CÓDIGO (ESTADO DA IMAGEM) -->
            <div id="recovery-step-1" class="animate__animated animate__fadeInUp">
                <header class="mb-5">
                    <h1 class="display-recovery fw-black text-white ls-tight mb-3">
                        Esqueceu a<br>Senha?
                    </h1>
                    <p class="description-fidelity">
                        Insira seu e-mail cadastrado para enviarmos o código de segurança.
                    </p>
                </header>

                <!-- Nota: O Orchestrator v51 captura o submit deste ID automaticamente -->
                <form id="form-recovery-request">
                    
                    <div class="vlog-field-group mb-5">
                        <div class="vlog-input-wrapper">
                            <i class="far fa-envelope vlog-icon-left"></i>
                            <input type="email" 
                                   id="recovery-email" 
                                   name="email"
                                   class="fidelity-input" 
                                   placeholder="E-mail Universitário" 
                                   required 
                                   spellcheck="false">
                        </div>
                    </div>

                    <button type="submit" id="btn-request-submit" class="btn-fidelity-primary w-100">
                        ENVIAR CÓDIGO
                    </button>
                </form>
            </div>

            <!-- PASSO 2: REDEFINIR (HIDDEN BY DEFAULT) -->
            <div id="recovery-step-2" class="d-none animate__animated animate__fadeInUp">
                <header class="mb-5">
                    <h1 class="display-recovery fw-black text-white ls-tight mb-3">
                        Novo<br>Acesso
                    </h1>
                    <p class="description-fidelity">
                        Digite o PIN de 6 dígitos e sua nova senha.
                    </p>
                </header>

                <form id="form-recovery-reset">
                    <div class="vlog-field-group mb-3">
                        <div class="vlog-input-wrapper">
                            <i class="fas fa-key vlog-icon-left"></i>
                            <input type="text" id="recovery-pin" name="token" class="fidelity-input text-center ls-vwide" placeholder="000000" maxlength="6" required>
                        </div>
                    </div>
                    <div class="vlog-field-group mb-4">
                        <div class="vlog-input-wrapper">
                            <i class="fas fa-lock vlog-icon-left"></i>
                            <input type="password" id="recovery-new-password" name="newPassword" class="fidelity-input" placeholder="Nova Senha" required minlength="6">
                        </div>
                    </div>

                    <button type="submit" id="btn-reset-submit" class="btn-fidelity-primary w-100">
                        ATUALIZAR SENHA
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- ==========================================================================
     LÓGICA DE INTERAÇÃO (RELIABILITY FIX)
     ========================================================================== -->
<script>
    /**
     * Controlador local de UI para a View de Recuperação
     */
    var VlogRecoveryUI = {
        init() {
            console.log("%c[VIEW] Fidelity Recovery v51 Loaded.", "color: #CCFF00; font-weight: bold;");
            
            // Verifica se o objeto global está ativo para evitar erro de undefined
            if (!window.VlogAuth) {
                console.warn("[RECOVERY] Aguardando inicialização do Kernel...");
            }
        },

        showStep2() {
            document.getElementById('recovery-step-1').classList.add('d-none');
            const step2 = document.getElementById('recovery-step-2');
            step2.classList.remove('d-none');
            if ("vibrate" in navigator) navigator.vibrate(15);
        }
    };

    // Auto-boot
    VlogRecoveryUI.init();
</script>

<!-- ==========================================================================
     ESTILIZAÇÃO DE ALTA FIDELIDADE (CSS 1:1)
     ========================================================================== -->
<style>
    /* RESET & CORE */
    #recovery-view-container {
        background-color: #000000;
        font-family: 'Inter', -apple-system, sans-serif;
        color: white;
    }

    .fw-black { font-weight: 900 !important; }

    /* Barra Superior Fidelity */
    .fidelity-top-bar {
        height: 80px;
        background-color: #000000;
    }

    .back-arrow-link {
        color: white;
        font-size: 20px;
        text-decoration: none;
        transition: opacity 0.2s;
    }

    .top-bar-title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    /* Tipografia Principal (Imagem) */
    .display-recovery {
        font-size: 38px;
        line-height: 1.1;
        letter-spacing: -1px;
    }

    .description-fidelity {
        color: #555555;
        font-size: 16px;
        font-weight: 500;
        line-height: 1.5;
    }

    /* Inputs Estilo Pill (#111111 conforme imagem) */
    .vlog-input-wrapper {
        position: relative;
        width: 100%;
    }

    .fidelity-input {
        width: 100%;
        background-color: #111111 !important;
        border: 1px solid #1a1a1a !important;
        border-radius: 20px !important;
        padding: 24px 24px 24px 65px !important;
        color: #FFFFFF !important;
        font-size: 16px;
        font-weight: 500;
        outline: none;
        transition: all 0.3s ease;
    }

    .fidelity-input:focus {
        border-color: #333333 !important;
        background-color: #151515 !important;
    }

    .fidelity-input::placeholder {
        color: #444444;
    }

    /* Ícone do Input */
    .vlog-icon-left {
        position: absolute;
        left: 25px;
        top: 50%;
        transform: translateY(-50%);
        color: #444444;
        font-size: 20px;
    }

    /* Botão Principal Lime (#CCFF00) */
    .btn-fidelity-primary {
        background-color: #CCFF00;
        color: #000000;
        border: none;
        border-radius: 100px;
        padding: 20px 0;
        font-weight: 900;
        font-size: 15px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-fidelity-primary:hover:not(:disabled) {
        transform: scale(1.02);
    }

    .btn-fidelity-primary:active {
        transform: scale(0.98);
    }

    .ls-vwide { letter-spacing: 10px !important; }

    /* Responsividade */
    @media (max-width: 480px) {
        .display-recovery { font-size: 32px; }
        .fidelity-input { padding: 20px 20px 20px 55px !important; }
        .description-fidelity { font-size: 14px; }
        .fidelity-top-bar { height: 60px; }
    }
</style>
