<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - SIGNUP VIEW v50.0.0
 * PORTAL DE CRIAÇÃO DE IDENTIDADE ACADÊMICA | DESIGN STAMPED (STABLE)
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Arquitetura de Interface (UX/UI):
 * - Stamped Layout: Integração direta dos elementos com o fundo atmosférico.
 * - Glass-Field Technology: Inputs com desfoque de 15px e bordas de baixa opacidade.
 * - Staggered Motion: Entrada rítmica de elementos (Header -> Inputs -> Button).
 * - Multi-Column Grid: Layout otimizado para preenchimento rápido em Desktop.
 * - Haptic Navigation: Feedback visual sincronizado com o Orchestrator v50.
 * ============================================================================
-->

<div id="signup-view-container" class="container min-vh-100 d-flex flex-column justify-content-center py-5">

    <!-- 🌌 CAMADA ATMOSFÉRICA (PARALLAX GLOWS) -->
    <div class="ambient-glow glow-bottom-left animate__animated animate__fadeIn"></div>
    <div class="ambient-glow glow-top-right animate__animated animate__fadeIn animate__delay-1s opacity-50"></div>

    <div class="row justify-content-center position-relative" style="z-index: 5;">
        <div class="col-12 col-lg-8 col-xl-7">

            <!-- BARRA DE TOPO: NAVEGAÇÃO VOLTAR -->
            <div class="mb-5 animate__animated animate__fadeInLeft">
                <a href="#/auth/login" class="stamped-back-link">
                    <i class="fas fa-arrow-left me-2"></i>
                    <span>ACESSAR CAMPUS</span>
                </a>
            </div>

            <!-- 1. CABEÇALHO BRANDING (STAMPED) -->
            <header class="mb-5 text-center text-lg-start animate__animated animate__fadeInDown">
                <h1 class="display-3 fw-black text-white ls-tight m-0">
                    Fazer Parte do<br><span class="text-neon">Ecossistema</span>
                </h1>
                <p class="text-muted fw-bold mt-3 ls-wide">CADASTRO DE ELITE UNIVERSITÁRIA</p>
                <div class="neon-line-stamped mx-auto mx-lg-0 mt-2"></div>
            </header>

            <!-- 2. FORMULÁRIO DE REGISTRO (STAMPED) -->
            <!-- Nota: O Orchestrator v50 captura o submit deste ID automaticamente -->
            <form id="vlog-signup-form" class="row g-4 animate__animated animate__fadeInUp animate__delay-1s">

                <!-- CAMPO: NOME COMPLETO -->
                <div class="col-12">
                    <div class="vlog-input-group">
                        <label for="signup-name" class="vlog-input-label ps-2">Nome Completo</label>
                        <div class="position-relative">
                            <i class="fas fa-user-graduate stamped-input-icon"></i>
                            <input type="text" 
                                   id="signup-name" 
                                   name="fullName"
                                   class="stamped-input" 
                                   placeholder="Seu nome acadêmico" 
                                   required 
                                   minlength="3">
                        </div>
                    </div>
                </div>

                <!-- CAMPO: E-MAIL -->
                <div class="col-12">
                    <div class="vlog-input-group">
                        <label for="signup-email" class="vlog-input-label ps-2">E-mail da Instituição</label>
                        <div class="position-relative">
                            <i class="fas fa-envelope stamped-input-icon"></i>
                            <input type="email" 
                                   id="signup-email" 
                                   name="email"
                                   class="stamped-input" 
                                   placeholder="seu@email.edu" 
                                   required>
                        </div>
                    </div>
                </div>

                <!-- CAMPO: SENHA -->
                <div class="col-md-6">
                    <div class="vlog-input-group">
                        <label for="signup-password" class="vlog-input-label ps-2">Senha</label>
                        <div class="position-relative">
                            <i class="fas fa-shield-alt stamped-input-icon"></i>
                            <input type="password" 
                                   id="signup-password" 
                                   name="password"
                                   class="stamped-input" 
                                   placeholder="Min. 6 caracteres" 
                                   required 
                                   minlength="6">
                        </div>
                    </div>
                </div>

                <!-- CAMPO: UNIVERSIDADE -->
                <div class="col-md-6">
                    <div class="vlog-input-group">
                        <label for="signup-university" class="vlog-input-label ps-2">Faculdade / Universidade</label>
                        <div class="position-relative">
                            <i class="fas fa-school stamped-input-icon"></i>
                            <input type="text" 
                                   id="signup-university" 
                                   name="university"
                                   class="stamped-input" 
                                   placeholder="Nome da instituição" 
                                   required>
                        </div>
                    </div>
                </div>

                <!-- CAMPO: REFERRAL (STAMPED ACCENT) -->
                <div class="col-12">
                    <div class="vlog-input-group">
                        <label for="signup-referral" class="vlog-input-label ps-2">Código de Convite (Opcional)</label>
                        <div class="position-relative">
                            <i class="fas fa-ticket-alt stamped-input-icon"></i>
                            <input type="text" 
                                   id="signup-referral" 
                                   name="referralCode"
                                   class="stamped-input input-neon-accent" 
                                   placeholder="Possui um convite? Cole aqui para +25 VS">
                        </div>
                    </div>
                </div>

                <!-- BOTÃO DE CONCLUSÃO MASTER -->
                <div class="col-12 mt-5">
                    <button type="submit" id="btn-signup-submit" class="btn-vlog-primary stamped-btn w-100 py-4 shadow-neon-soft">
                        <span id="btn-text">CONCLUIR CADASTRO</span>
                        <i class="fas fa-check-circle ms-2"></i>
                    </button>
                </div>

                <!-- RODAPÉ: REDIRECIONAMENTO -->
                <footer class="col-12 text-center mt-4 pb-5">
                    <p class="text-muted">Já é membro do campus? 
                        <a href="#/auth/login" class="text-white fw-black text-decoration-underline ms-1 hover-neon-text">
                            Acessar Campus
                        </a>
                    </p>
                </footer>

            </form>
        </div>
    </div>
</div>

<!-- ==========================================================================
     LÓGICA DE CONTROLE DA VIEW (VLOG_SIGNUP_CONTROLLER)
     ========================================================================== -->
<script>
    /**
     * Singleton de Gerenciamento da View de Cadastro
     */
    const VlogSignup = {
        /**
         * Inicialização do Componente
         */
        init() {
            console.log("%c[VIEW] Stamped Signup Engine v50.0.0 Online.", "color: #CCFF00; font-weight: bold;");
            this._setupVisualInteractions();
            
            if (window.VlogTelemetry) {
                window.VlogTelemetry.trackEvent('view_stamped_signup', { platform: 'web_spa' });
            }
        },

        /**
         * Configura efeitos visuais de foco e profundidade
         */
        _setupVisualInteractions() {
            // Efeito Parallax nos brilhos de fundo baseado no cursor
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 45;
                const y = (window.innerHeight / 2 - e.pageY) / 45;
                const glow = document.querySelector('.glow-bottom-left');
                if (glow) {
                    glow.style.transform = `translate(${x}px, ${y}px)`;
                }
            });

            // Focus automático no primeiro campo após a animação de entrada
            setTimeout(() => {
                const nameInput = document.getElementById('signup-name');
                if (nameInput) nameInput.focus();
            }, 1000);

            // Validação visual de senha em tempo real (opcional/UX enhancement)
            const passInput = document.getElementById('signup-password');
            if (passInput) {
                passInput.addEventListener('input', (e) => {
                    if (e.target.value.length >= 6) {
                        e.target.style.borderColor = 'var(--primary-neon)';
                    } else {
                        e.target.style.borderColor = 'rgba(255,255,255,0.1)';
                    }
                });
            }
        }
    };

    // Auto-boot da lógica de componente
    VlogSignup.init();
</script>

<!-- ==========================================================================
     ESTILIZAÇÃO STAMPED (CSS INDUSTRIAL)
     ========================================================================== -->
<style>
    :root {
        --primary-neon: #CCFF00;
        --shadow-neon: 0 0 25px rgba(204, 255, 0, 0.4);
        --stamped-field-bg: rgba(255, 255, 255, 0.04);
        --stamped-field-border: rgba(255, 255, 255, 0.1);
    }

    #signup-view-container {
        background: #000;
        overflow-x: hidden;
    }

    /* Linha Decorativa Chapa */
    .neon-line-stamped {
        width: 100px;
        height: 6px;
        background: var(--primary-neon);
        border-radius: 20px;
        box-shadow: var(--shadow-neon);
    }

    /* Link de Voltar Minimalista */
    .stamped-back-link {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-weight: 800;
        font-size: 0.75rem;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    .stamped-back-link:hover {
        color: var(--primary-neon);
        transform: translateX(-5px);
    }

    /* Stamped Input - Estética v50 */
    .stamped-input {
        background: var(--stamped-field-bg) !important;
        border: 1px solid var(--stamped-field-border) !important;
        border-radius: 20px !important;
        padding: 20px 25px 20px 55px !important;
        color: white !important;
        font-size: 17px !important;
        font-weight: 500 !important;
        width: 100%;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        outline: none;
    }

    .stamped-input:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: var(--primary-neon) !important;
        box-shadow: 0 0 30px rgba(204, 255, 0, 0.15);
        transform: translateY(-2px);
    }

    .stamped-input::placeholder {
        color: rgba(255, 255, 255, 0.2);
        font-weight: 400;
    }

    /* Ícones dos Inputs */
    .stamped-input-icon {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.3);
        font-size: 1.1rem;
        pointer-events: none;
        transition: color 0.3s ease;
    }

    .vlog-input-group:focus-within .stamped-input-icon {
        color: var(--primary-neon);
    }

    /* Botão Stamped Nuclear */
    .stamped-btn {
        border-radius: 20px !important;
        font-size: 16px !important;
        font-weight: 900 !important;
        letter-spacing: 2px !important;
        text-transform: uppercase;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .stamped-btn:hover:not(:disabled) {
        transform: scale(1.02) translateY(-3px);
        box-shadow: 0 15px 40px rgba(204, 255, 0, 0.35);
    }

    .stamped-btn:active {
        transform: scale(0.98);
    }

    /* Labels Master */
    .vlog-input-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 10px;
        display: block;
    }

    /* Glow Elements (Background Atmosphere) */
    .ambient-glow {
        position: fixed;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(204, 255, 0, 0.07) 0%, rgba(0, 0, 0, 0) 70%);
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
    }

    .glow-bottom-left { bottom: -300px; left: -300px; background: radial-gradient(circle, rgba(160, 32, 240, 0.08) 0%, rgba(0, 0, 0, 0) 70%); }
    .glow-top-right { top: -300px; right: -300px; }

    /* Custom Input Accent for Referral */
    .input-neon-accent:focus {
        box-shadow: 0 0 35px rgba(204, 255, 0, 0.3);
    }

    /* Utilitários de Animação */
    .animate__delay-1s { --animate-delay: 0.15s; }

    /* Responsividade Industrial */
    @media (max-width: 991px) {
        .display-3 { font-size: 3.5rem; text-align: center; }
        .stamped-input { padding: 22px 25px 22px 60px !important; }
    }

    @media (max-width: 576px) {
        .display-3 { font-size: 2.8rem; }
        .stamped-btn { padding: 22px !important; }
        .ambient-glow { width: 500px; height: 500px; }
        .stamped-back-link { justify-content: center; display: flex; }
    }
</style>
