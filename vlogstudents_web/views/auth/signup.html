<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - SIGNUP VIEW v51.0.0
 * PORTAL DE REGISTRO ACADÊMICO | FIDELITY DESIGN 1:1
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Especificações Visuais:
 * - Background: Deep Black (#000000)
 * - Accent: Lime Neon (#CCFF00)
 * - Input Style: Pill-shaped (#111111) com ícones cinza (#555555)
 * - Back Button: Circle Icon Button (Top Left)
 * ============================================================================
-->

<div id="signup-view-container" class="container-fluid min-vh-100 d-flex flex-column p-4">
    
    <!-- 🌌 ATMOSFERA DE FUNDO (Glow roxo sutil conforme a imagem) -->
    <div class="signup-atmosphere"></div>

    <!-- BOTÃO VOLTAR (TOP LEFT) -->
    <div class="pt-2 ps-2 mb-4 animate__animated animate__fadeIn">
        <a href="#/auth/login" class="btn-fidelity-back">
            <i class="fas fa-chevron-left"></i>
        </a>
    </div>

    <div class="row justify-content-center position-relative" style="z-index: 10;">
        <div class="col-12 col-md-10 col-lg-6 col-xl-4">

            <!-- 1. CABEÇALHO (CONFORME IMAGEM) -->
            <header class="mb-5 animate__animated animate__fadeInDown">
                <h1 class="display-signup fw-black text-white ls-tight mb-3">
                    Criar Conta<br>Acadêmica
                </h1>
                <p class="sub-header-fidelity">
                    Garanta agora seu bônus de <span class="text-neon">+100 Voices (VS)</span>
                </p>
            </header>

            <!-- 2. FORMULÁRIO DE CADASTRO -->
            <!-- Nota: O Orchestrator v51 captura o submit deste ID automaticamente -->
            <form id="vlog-signup-form" class="animate__animated animate__fadeInUp animate__delay-1s">
                
                <!-- CAMPO: NOME -->
                <div class="vlog-field-group mb-3">
                    <div class="vlog-input-wrapper">
                        <i class="far fa-user vlog-icon-left"></i>
                        <input type="text" id="signup-name" name="fullName" class="fidelity-input" placeholder="Nome e Sobrenome" required minlength="3">
                    </div>
                </div>

                <!-- CAMPO: E-MAIL -->
                <div class="vlog-field-group mb-3">
                    <div class="vlog-input-wrapper">
                        <span class="vlog-icon-left">@</span>
                        <input type="email" id="signup-email" name="email" class="fidelity-input" placeholder="E-mail da sua Faculdade" required>
                    </div>
                </div>

                <!-- CAMPO: SENHA -->
                <div class="vlog-field-group mb-3">
                    <div class="vlog-input-wrapper">
                        <i class="fas fa-lock vlog-icon-left"></i>
                        <input type="password" id="signup-password" name="password" class="fidelity-input" placeholder="Crie uma Senha Forte" required minlength="6">
                        <button type="button" class="vlog-icon-right" onclick="VlogSignup.togglePassword()">
                            <i class="far fa-eye" id="signup-eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- CAMPO: INSTITUIÇÃO -->
                <div class="vlog-field-group mb-3">
                    <div class="vlog-input-wrapper">
                        <i class="fas fa-graduation-cap vlog-icon-left"></i>
                        <input type="text" id="signup-university" name="university" class="fidelity-input" placeholder="Nome da sua Instituição" required>
                    </div>
                </div>

                <!-- CAMPO: REFERRAL (OPCIONAL) -->
                <div class="vlog-field-group mb-4">
                    <div class="vlog-input-wrapper">
                        <i class="fas fa-magic vlog-icon-left"></i>
                        <input type="text" id="signup-referral" name="referralCode" class="fidelity-input" placeholder="Código de Convite (Opcional)">
                    </div>
                </div>

                <!-- CHECKBOX TERMOS -->
                <div class="d-flex align-items-start gap-3 mb-5 px-2 animate__animated animate__fadeIn">
                    <div class="fidelity-checkbox-container">
                        <input type="checkbox" id="signup-terms" required>
                        <label for="signup-terms"></label>
                    </div>
                    <p class="terms-text m-0">
                        Concordo com os Termos de Conduta e as Políticas de Privacidade do Ecossistema VlogStudents.
                    </p>
                </div>

                <!-- BOTÃO CONCLUIR -->
                <div class="mb-5">
                    <button type="submit" id="btn-signup-submit" class="btn-fidelity-primary w-100">
                        CONCLUIR CADASTRO ACADÊMICO
                    </button>
                </div>

                <!-- FOOTER -->
                <footer class="text-center mt-4">
                    <p class="footer-text">
                        Já é um membro? <a href="#/auth/login" class="text-white fw-bold text-decoration-none">Acesse sua conta</a>
                    </p>
                </footer>

            </form>
        </div>
    </div>
</div>

<!-- ==========================================================================
     LÓGICA DE INTERAÇÃO (RELIABILITY FIX)
     ========================================================================== -->
<script>
    /**
     * Controlador de Interface de Cadastro
     */
    var VlogSignup = {
        _passVisible: false,

        init() {
            console.log("%c[VIEW] Fidelity Signup v51 Loaded.", "color: #CCFF00; font-weight: bold;");
            
            // Validação proativa do objeto global para evitar erro de "undefined"
            if (!window.VlogAuth) {
                console.warn("[AUTH] Kernel não detectado. Tentando religar...");
            }
        },

        togglePassword() {
            const input = document.getElementById('signup-password');
            const icon = document.getElementById('signup-eye-icon');
            this._passVisible = !this._passVisible;

            input.type = this._passVisible ? 'text' : 'password';
            icon.className = this._passVisible ? 'far fa-eye-slash' : 'far fa-eye';
            
            if ("vibrate" in navigator) navigator.vibrate(10);
        }
    };

    // Auto-boot
    VlogSignup.init();
</script>

<!-- ==========================================================================
     ESTILIZAÇÃO DE ALTA FIDELIDADE (CSS 1:1)
     ========================================================================== -->
<style>
    /* FUNDO E FONTE */
    #signup-view-container {
        background-color: #000000;
        font-family: 'Inter', -apple-system, sans-serif;
        overflow-x: hidden;
    }

    .fw-black { font-weight: 900 !important; }

    /* Botão Voltar (Círculo Top Left) */
    .btn-fidelity-back {
        width: 45px;
        height: 45px;
        background-color: #111111;
        border: 1px solid #222222;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-decoration: none;
        transition: all 0.2s ease;
    }

    .btn-fidelity-back:hover {
        background-color: #222222;
    }

    /* Título Principal */
    .display-signup {
        font-size: 38px;
        line-height: 1.1;
        letter-spacing: -1px;
    }

    /* Sub-header com destaque neon */
    .sub-header-fidelity {
        color: #555555;
        font-size: 14px;
        font-weight: 600;
    }

    .text-neon { color: #CCFF00 !important; }

    /* Inputs Estilo Pill */
    .vlog-input-wrapper {
        position: relative;
        width: 100%;
    }

    .fidelity-input {
        width: 100%;
        background-color: #111111 !important;
        border: 1px solid #1a1a1a !important;
        border-radius: 25px !important;
        padding: 24px 60px !important;
        color: #FFFFFF !important;
        font-size: 16px;
        font-weight: 500;
        outline: none;
        transition: all 0.3s ease;
    }

    .fidelity-input:focus {
        border-color: #333333 !important;
        background-color: #141414 !important;
    }

    .fidelity-input::placeholder {
        color: #444444;
    }

    /* Ícones */
    .vlog-icon-left {
        position: absolute;
        left: 25px;
        top: 50%;
        transform: translateY(-50%);
        color: #444444;
        font-size: 18px;
    }

    .vlog-icon-right {
        position: absolute;
        right: 25px;
        top: 50%;
        transform: translateY(-50%);
        color: #444444;
        background: none;
        border: none;
        cursor: pointer;
    }

    /* Fidelity Checkbox */
    .fidelity-checkbox-container {
        position: relative;
        width: 26px;
        height: 26px;
    }

    .fidelity-checkbox-container input {
        opacity: 0;
        width: 0; height: 0;
    }

    .fidelity-checkbox-container label {
        position: absolute;
        top: 0; left: 0;
        width: 26px; height: 26px;
        background-color: #000;
        border: 2px solid #222222;
        border-radius: 8px;
        cursor: pointer;
    }

    .fidelity-checkbox-container input:checked + label {
        background-color: #CCFF00;
        border-color: #CCFF00;
    }

    .fidelity-checkbox-container input:checked + label:after {
        content: '\f00c';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        color: black;
        font-size: 14px;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
    }

    .terms-text {
        color: #555555;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.4;
    }

    /* Botão Principal Lime */
    .btn-fidelity-primary {
        background-color: #CCFF00;
        color: #000000;
        border: none;
        border-radius: 100px;
        padding: 22px 0;
        font-weight: 900;
        font-size: 15px;
        letter-spacing: 0.5px;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-fidelity-primary:hover:not(:disabled) {
        transform: scale(1.02);
    }

    /* Footer */
    .footer-text {
        color: #555555;
        font-size: 14px;
    }

    /* Atmosfera (Glow Roxo) */
    .signup-atmosphere {
        position: fixed;
        bottom: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle at 50% 110%, rgba(80, 0, 150, 0.15) 0%, rgba(0, 0, 0, 0) 60%);
        pointer-events: none;
    }

    /* Responsividade */
    @media (max-width: 480px) {
        .display-signup { font-size: 32px; }
        .fidelity-input { padding: 20px 55px !important; }
        .btn-fidelity-primary { padding: 18px 0; font-size: 13px; }
    }
</style>
