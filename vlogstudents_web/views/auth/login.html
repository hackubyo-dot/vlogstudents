<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - LOGIN VIEW v41.0.0
 * PORTAL DE IDENTIDADE ACADÊMICA & ACESSO NUCLEAR (STABLE)
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Arquitetura de Interface (UX/UI):
 * - Glassmorphism Core: Camadas de desfoque de 35px com bordas de cristal.
 * - Staggered Animations: Sequenciamento de entrada via Animate.css + Delay.
 * - Hardware Acceleration: Uso de 'animate-gpu' para transições de 60fps.
 * - Hybrid Auth Bridge: Suporte a E-mail/Senha e Identidade Federada Google.
 * - Event Relinking: Lógica de vinculação atômica para evitar botões mortos.
 * ============================================================================
-->

<div id="login-view-container" class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-5">
    
    <!-- 🌌 CAMADA ATMOSFÉRICA (GLOW ELEMENTS) -->
    <div class="ambient-glow glow-top-right animate__animated animate__fadeIn"></div>
    <div class="ambient-glow glow-bottom-left animate__animated animate__fadeIn animate__delay-2s"></div>

    <div class="row w-100 justify-content-center position-relative" style="z-index: 2;">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

            <!-- 🛡️ CARD DE AUTENTICAÇÃO (CHAPA DESIGN) -->
            <div class="auth-card p-4 p-md-5 animate__animated animate__zoomIn animate__faster">
                
                <!-- CABEÇALHO BRANDING -->
                <header class="mb-5 animate__animated animate__fadeInDown animate__delay-1s text-center text-md-start">
                    <div class="brand-logo-container mb-4">
                        <img src="assets/images/logo.png" alt="VlogStudents" width="100" class="pulse-slow">
                    </div>
                    <h1 class="h1 fw-black text-white ls-tight mb-2">
                        Acesse seu<br><span class="text-neon">Campus</span>
                    </h1>
                    <div class="neon-underline" style="width: 60px; height: 6px; background: var(--primary-neon); border-radius: 3px; box-shadow: var(--shadow-neon);"></div>
                </header>

                <!-- 📝 FORMULÁRIO DE ACESSO -->
                <form id="vlog-login-form" autocomplete="on" class="animate-gpu">

                    <!-- GRUPO: IDENTIDADE (E-MAIL) -->
                    <div class="vlog-input-group mb-4 animate__animated animate__fadeInUp animate__delay-1s">
                        <label for="login-email" class="vlog-input-label">E-mail Universitário</label>
                        <div class="position-relative field-wrapper">
                            <i class="fas fa-at vlog-input-icon position-absolute top-50 start-0 translate-middle-y ms-4 text-muted"></i>
                            <input type="email" 
                                   id="login-email" 
                                   name="email"
                                   class="vlog-input-field ps-5" 
                                   placeholder="seu@email.edu" 
                                   required 
                                   spellcheck="false">
                        </div>
                    </div>

                    <!-- GRUPO: SEGURANÇA (SENHA) -->
                    <div class="vlog-input-group mb-3 animate__animated animate__fadeInUp animate__delay-2s">
                        <label for="login-password" class="vlog-input-label">Senha de Acesso</label>
                        <div class="vlog-password-container position-relative field-wrapper">
                            <i class="fas fa-lock vlog-input-icon position-absolute top-50 start-0 translate-middle-y ms-4 text-muted"></i>
                            <input type="password" 
                                   id="login-password" 
                                   name="password"
                                   class="vlog-input-field ps-5" 
                                   placeholder="••••••••" 
                                   required>
                            <button type="button" 
                                    class="vlog-password-toggle" 
                                    onclick="VlogLogin.togglePassword()"
                                    aria-label="Alternar visibilidade da senha">
                                <i class="far fa-eye" id="password-toggle-icon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- RECOVERY LINK -->
                    <div class="d-flex justify-content-end mb-5 animate__animated animate__fadeIn animate__delay-2s">
                        <a href="#/auth/recovery" class="text-neon fw-black text-xs ls-wide hover-glow-text text-decoration-none">
                            ESQUECEU A SENHA?
                        </a>
                    </div>

                    <!-- BOTÃO MESTRE DE ENTRADA -->
                    <div class="mb-5 animate__animated animate__fadeInUp animate__delay-3s">
                        <button type="submit" id="btn-login-submit" class="btn-vlog-primary w-100 py-3 shadow-neon-soft">
                            <span id="login-btn-text">ENTRAR NO VLOG</span>
                            <i class="fas fa-arrow-right ms-2" id="login-btn-icon"></i>
                        </button>
                    </div>

                    <!-- 🌐 DIVISOR DE MÉTODOS -->
                    <div class="d-flex align-items-center mb-5 animate__animated animate__fadeIn animate__delay-4s">
                        <div class="flex-grow-1 border-bottom border-secondary opacity-25"></div>
                        <span class="mx-3 text-muted fw-black text-xxs ls-vwide">OU ACESSE COM</span>
                        <div class="flex-grow-1 border-bottom border-secondary opacity-25"></div>
                    </div>

                    <!-- BOTÕES SOCIAIS (IDENTIDADE FEDERADA) -->
                    <div class="d-flex justify-content-center gap-4 mb-5 animate__animated animate__fadeInUp animate__delay-4s">
                        <div class="social-login-pill google" onclick="VlogLogin.handleGoogleLogin()" title="Entrar com Google">
                            <img src="assets/images/google.png" alt="G" width="24">
                            <span class="ms-2 fw-bold d-none d-sm-inline">GOOGLE</span>
                        </div>
                        <div class="social-login-pill apple" title="Entrar com Apple">
                            <i class="fab fa-apple fa-lg text-white"></i>
                        </div>
                    </div>

                    <!-- RODAPÉ: CTA DE REGISTRO -->
                    <footer class="text-center animate__animated animate__fadeInUp animate__delay-5s">
                        <p class="text-muted text-small">
                            Novo por aqui? 
                            <a href="#/auth/signup" class="text-white fw-black text-decoration-underline ms-1 hover-neon-text">
                                Crie sua conta
                            </a>
                        </p>
                    </footer>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- ==========================================================================
     LÓGICA DE CONTROLE DA VIEW (VLOG_LOGIN_CONTROLLER)
     ========================================================================== -->
<script>
    /**
     * Singleton de Gerenciamento da View de Login
     */
    const VlogLogin = {
        _isPasswordVisible: false,
        _isSubmitting: false,

        /**
         * Inicialização do Componente
         */
        init() {
            console.log("%c[VIEW] Login Controller v41.0.0 Online.", "color: #00FBFF; font-weight: bold;");
            this._setupVisuals();
            
            // O Orchestrator v41 já cuida do event binding do formulário,
            // mas mantemos as funções auxiliares (toggle, google) aqui.
            
            if (window.VlogTelemetry) {
                window.VlogTelemetry.trackEvent('view_login_page', { source: 'web_spa' });
            }
        },

        /**
         * Alternar Visibilidade da Senha
         */
        togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('password-toggle-icon');
            
            this._isPasswordVisible = !this._isPasswordVisible;
            input.type = this._isPasswordVisible ? 'text' : 'password';
            icon.className = this._isPasswordVisible ? 'far fa-eye-slash' : 'far fa-eye';

            // Feedback Háptico para Mobile Browsers
            if ("vibrate" in navigator) navigator.vibrate(10);
        },

        /**
         * Fluxo Google Sign-In
         */
        handleGoogleLogin() {
            console.log("[GOOGLE_AUTH] Handshake federado solicitado.");
            if (window.VlogTelemetry) window.VlogTelemetry.addBreadcrumb('auth', 'Google trigger clicked');
            
            // Invoca o prompt do Google Identity Services injetado no index.html
            if (window.google) {
                google.accounts.id.prompt();
            } else {
                window.VlogMain._showToast("Sincronizando com Google...", "info");
            }
        },

        /**
         * Efeito visual para erros de credenciais (Shake)
         */
        shake() {
            const card = document.querySelector('.auth-card');
            card.classList.add('animate__shakeX');
            setTimeout(() => card.classList.remove('animate__shakeX'), 600);
        },

        /**
         * Efeitos de atmosfera e interação
         */
        _setupVisuals() {
            // Efeito Parallax nos brilhos atmosféricos
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                const glow = document.querySelector('.glow-top-right');
                if (glow) {
                    glow.style.transform = `translate(${x}px, ${y}px)`;
                }
            });

            // Glow dinâmico nos inputs
            const inputs = document.querySelectorAll('.vlog-input-field');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.closest('.field-wrapper').style.borderColor = 'var(--primary-neon)';
                    input.closest('.field-wrapper').style.boxShadow = '0 0 15px rgba(204, 255, 0, 0.2)';
                });
                input.addEventListener('blur', () => {
                    input.closest('.field-wrapper').style.borderColor = 'transparent';
                    input.closest('.field-wrapper').style.boxShadow = 'none';
                });
            });
        }
    };

    // Auto-inicialização do componente
    VlogLogin.init();
</script>

<!-- ==========================================================================
     ESTILIZAÇÃO DE ALTA FIDELIDADE (CSS MASTER)
     ========================================================================== -->
<style>
    :root {
        --glass-bg: rgba(15, 23, 42, 0.7);
        --glass-border: rgba(255, 255, 255, 0.08);
        --primary-neon: #CCFF00;
        --shadow-neon: 0 0 20px rgba(204, 255, 0, 0.4);
    }

    #login-view-container {
        overflow: hidden;
        background: #000;
    }

    /* Card com Glassmorphism Avançado */
    .auth-card {
        background: var(--glass-bg);
        backdrop-filter: blur(35px);
        -webkit-backdrop-filter: blur(35px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                    inset 0 1px 1px var(--glass-border);
    }

    /* Input Fields Customizados */
    .field-wrapper {
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid transparent;
        background: rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
    }

    .vlog-input-field {
        width: 100%;
        background: transparent !important;
        border: none;
        padding: 18px 20px;
        color: #FFFFFF;
        font-weight: 500;
        outline: none;
        font-size: 1rem;
    }

    .vlog-input-field::placeholder {
        color: rgba(255, 255, 255, 0.2);
    }

    .vlog-input-icon {
        color: rgba(255, 255, 255, 0.3);
        font-size: 1.1rem;
        transition: color 0.3s ease;
    }

    /* Password Toggle Button */
    .vlog-password-toggle {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.3);
        padding: 0 20px;
        cursor: pointer;
        transition: color 0.2s ease;
    }

    .vlog-password-toggle:hover {
        color: var(--primary-neon);
    }

    /* Botão Master Neon */
    .btn-vlog-primary {
        background: var(--primary-neon);
        color: #000;
        border: none;
        border-radius: 16px;
        font-weight: 900;
        letter-spacing: 1px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-vlog-primary:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(204, 255, 0, 0.4);
    }

    .btn-vlog-primary:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
    }

    /* Social Login Pills */
    .social-login-pill {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        padding: 12px 25px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        transition: all 0.3s ease;
    }

    .social-login-pill:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }

    .social-login-pill.google:hover {
        background: #fff;
        color: #000;
    }

    /* Glow Elements Background */
    .ambient-glow {
        position: fixed;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(204, 255, 0, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
        border-radius: 50%;
        filter: blur(60px);
        pointer-events: none;
    }

    .glow-top-right { top: -150px; right: -150px; }
    .glow-bottom-left { bottom: -150px; left: -150px; background: radial-gradient(circle, rgba(0, 251, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%); }

    /* Utilitários de Animação Staggered */
    .animate__delay-1s { --animate-delay: 0.1s; }
    .animate__delay-2s { --animate-delay: 0.2s; }
    .animate__delay-3s { --animate-delay: 0.3s; }
    .animate__delay-4s { --animate-delay: 0.4s; }
    .animate__delay-5s { --animate-delay: 0.5s; }

    /* Customização de Scroll do Card */
    .auth-card::-webkit-scrollbar { width: 4px; }
    .auth-card::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 10px; }

    @media (max-width: 576px) {
        .auth-card {
            padding: 30px 20px !important;
            border-radius: 0;
            border: none;
            background: transparent;
            box-shadow: none;
            backdrop-filter: none;
        }
        .ambient-glow { display: none; }
    }
</style>
