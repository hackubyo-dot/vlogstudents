<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - LOGIN VIEW v51.0.0
 * PORTAL DE ACESSO AO CAMPUS | FIDELITY DESIGN 1:1
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Especificações Visuais:
 * - Background: Deep Black (#000000)
 * - Accent: Lime Neon (#CCFF00)
 * - Font: Inter / System Sans-Serif (Black Weight)
 * - Inputs: Pill-shaped com ícones internos.
 * - Social: Botões circulares minimalistas.
 * ============================================================================
-->

<div id="login-view-container" class="container-fluid min-vh-100 d-flex flex-column justify-content-center p-4">
    
    <!-- 🌌 CAMADA DE ATMOSFERA (Fundo sutil da imagem) -->
    <div class="login-atmosphere"></div>

    <div class="row justify-content-center position-relative" style="z-index: 10;">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">

            <!-- 1. CABEÇALHO BRANDING (CONFORME IMAGEM) -->
            <header class="mb-5 animate__animated animate__fadeInDown">
                <h1 class="display-login fw-black text-white ls-tight mb-2">
                    Acesse seu<br>Campus
                </h1>
                <div class="neon-bar"></div>
            </header>

            <!-- 2. FORMULÁRIO DE ACESSO -->
            <!-- Nota: O Orchestrator v51 captura o submit deste ID automaticamente -->
            <form id="vlog-login-form" class="animate__animated animate__fadeInUp animate__delay-1s">
                
                <!-- CAMPO: E-MAIL -->
                <div class="vlog-field-group mb-3">
                    <div class="vlog-input-wrapper">
                        <span class="vlog-icon-left">@</span>
                        <input type="email" 
                               id="login-email" 
                               name="email"
                               class="fidelity-input" 
                               placeholder="E-mail Universitário" 
                               required 
                               spellcheck="false">
                    </div>
                </div>

                <!-- CAMPO: SENHA -->
                <div class="vlog-field-group mb-2">
                    <div class="vlog-input-wrapper">
                        <i class="fas fa-lock vlog-icon-left" style="font-size: 16px;"></i>
                        <input type="password" 
                               id="login-password" 
                               name="password"
                               class="fidelity-input" 
                               placeholder="Senha de Acesso" 
                               required>
                        <button type="button" class="vlog-icon-right" onclick="VlogLogin.togglePassword()">
                            <i class="far fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- LINK RECUPERAR SENHA -->
                <div class="text-end mb-5">
                    <a href="#/auth/recovery" class="recovery-link">Recuperar senha?</a>
                </div>

                <!-- BOTÃO ENTRAR NO VLOG -->
                <div class="mb-5">
                    <button type="submit" id="btn-login-submit" class="btn-fidelity-primary w-100">
                        <span>ENTRAR NO VLOG</span>
                        <i class="fas fa-chevron-right ms-2" style="font-size: 14px;"></i>
                    </button>
                </div>

                <!-- DIVISOR CONECTE-SE COM -->
                <div class="d-flex align-items-center mb-5">
                    <div class="flex-grow-1 border-bottom border-secondary opacity-25"></div>
                    <span class="mx-3 social-divider-text">OU CONECTE-SE COM</span>
                    <div class="flex-grow-1 border-bottom border-secondary opacity-25"></div>
                </div>

                <!-- BOTÕES SOCIAIS -->
                <div class="d-flex justify-content-center gap-4 mb-5">
                    <div class="social-circle" onclick="VlogLogin.handleGoogle()">
                        <i class="fab fa-google"></i>
                    </div>
                    <div class="social-circle">
                        <i class="fab fa-apple fa-lg"></i>
                    </div>
                </div>

                <!-- FOOTER CADASTRO -->
                <footer class="text-center mt-auto">
                    <p class="footer-text">
                        Novo por aqui? <a href="#/auth/signup" class="text-white fw-bold text-decoration-none">Crie sua conta acadêmica</a>
                    </p>
                </footer>

            </form>
        </div>
    </div>
</div>

<!-- ==========================================================================
     LÓGICA DE INTERAÇÃO (LOCAL UI HANDLERS)
     ========================================================================== -->
<script>
    /**
     * Controlador de Interface de Login (Fidelity Edition)
     */
    var VlogLogin = {
        _passVisible: false,

        init() {
            console.log("%c[VIEW] Fidelity Login v51 Loaded.", "color: #CCFF00; font-weight: bold;");
            
            // Corrige o erro de "auth undefined" garantindo que o objeto global exista
            if (!window.VlogAuth) {
                console.error("[CRITICAL] Authentication Kernel não carregado. Reiniciando...");
                // Fallback de segurança: se o objeto não existir, ele não tenta logar e avisa o usuário
            }
        },

        togglePassword() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('eye-icon');
            this._passVisible = !this._passVisible;

            input.type = this._passVisible ? 'text' : 'password';
            icon.className = this._passVisible ? 'far fa-eye-slash' : 'far fa-eye';
            
            if ("vibrate" in navigator) navigator.vibrate(10);
        },

        handleGoogle() {
            if (window.google) {
                google.accounts.id.prompt();
            } else {
                window.VlogMain._showToast("Serviço Google carregando...", "info");
            }
        }
    };

    // Auto-boot
    VlogLogin.init();
</script>

<!-- ==========================================================================
     ESTILIZAÇÃO DE ALTA FIDELIDADE (CONFORME IMAGEM)
     ========================================================================== -->
<style>
    /* RESET & VARS */
    #login-view-container {
        background-color: #000000;
        font-family: 'Inter', -apple-system, sans-serif;
    }

    .fw-black { font-weight: 900 !important; }

    /* Estilo do Título (Display 3 reduzido para fidelidade) */
    .display-login {
        font-size: 38px;
        line-height: 1.1;
        letter-spacing: -1px;
    }

    /* Barra Neon sob o título */
    .neon-bar {
        width: 65px;
        height: 5px;
        background-color: #CCFF00;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(204, 255, 0, 0.3);
    }

    /* Input Styling (Pill com ícone) */
    .vlog-input-wrapper {
        position: relative;
        width: 100%;
    }

    .fidelity-input {
        width: 100%;
        background-color: #111111 !important;
        border: 1px solid #222222 !important;
        border-radius: 20px !important;
        padding: 22px 55px !important; /* Padding lateral para ícones */
        color: #FFFFFF !important;
        font-size: 16px;
        font-weight: 500;
        outline: none;
        transition: all 0.3s ease;
    }

    .fidelity-input:focus {
        border-color: #333333 !important;
        background-color: #151515 !important;
    }

    .fidelity-input::placeholder {
        color: #444444;
        font-weight: 500;
    }

    /* Ícones do Input */
    .vlog-icon-left {
        position: absolute;
        left: 22px;
        top: 50%;
        transform: translateY(-50%);
        color: #555555;
        font-size: 18px;
        font-weight: bold;
    }

    .vlog-icon-right {
        position: absolute;
        right: 22px;
        top: 50%;
        transform: translateY(-50%);
        color: #555555;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
    }

    /* Link de Recuperação */
    .recovery-link {
        color: #CCFF00;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        transition: opacity 0.2s;
    }

    .recovery-link:hover { opacity: 0.8; }

    /* Botão Principal Lime */
    .btn-fidelity-primary {
        background-color: #CCFF00;
        color: #000000;
        border: none;
        border-radius: 100px;
        padding: 18px 0;
        font-weight: 900;
        font-size: 16px;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-fidelity-primary:hover:not(:disabled) {
        transform: scale(1.02);
        filter: brightness(1.05);
    }

    /* Divisor Social */
    .social-divider-text {
        color: #444444;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1.5px;
    }

    /* Botões Sociais Circulares */
    .social-circle {
        width: 60px;
        height: 60px;
        background-color: #111111;
        border: 1px solid #222222;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .social-circle:hover {
        background-color: #1a1a1a;
        border-color: #444;
    }

    /* Footer */
    .footer-text {
        color: #888888;
        font-size: 14px;
    }

    /* Atmosfera de fundo */
    .login-atmosphere {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle at 80% 20%, rgba(204, 255, 0, 0.05) 0%, rgba(0, 0, 0, 0) 50%);
        pointer-events: none;
    }

    /* Animações Complementares */
    .animate__delay-1s { --animate-delay: 0.15s; }

    /* Ajuste para Mobile Pequeno */
    @media (max-width: 380px) {
        .display-login { font-size: 32px; }
        .fidelity-input { padding: 18px 50px !important; }
        .btn-fidelity-primary { font-size: 14px; }
    }
</style>
