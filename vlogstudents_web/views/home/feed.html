<!-- 
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - RESPONSIVE FEED ENGINE v200.0.0
 * FULL TIKTOK CLONE DESIGN | DUAL-LAYOUT KERNEL | NEON DB SYNC
 * 
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 * 
 * Engenharia de Fluxo:
 * - Dynamic Viewport Detection: Identifica Mobile vs Desktop em tempo real.
 * - TikTok Design Language: 100% de fidelidade aos ícones, margens e transparências.
 * - Desktop Split-Pane: Sidebar (Left) + Player (Center) + Interaction (Right).
 * - Mobile Full-Screen: Vídeo absoluto com Action Column flutuante.
 * - Advanced Video Controls: Seek 10s, Volume Sync, Auto-Play/Pause.
 * - Social Integration: Likes, Discussões aninhadas e Follow persistente.
 * ============================================================================
-->

<div id="feed-orchestrator" class="vh-100 vw-100 bg-black overflow-hidden position-relative">

    <!-- 1. CAMADA DESKTOP: SIDEBAR ESQUERDA (APARECE APENAS EM TELA GRANDE) -->
    <aside id="desktop-sidebar" class="d-none d-lg-flex flex-column position-fixed h-100 border-end-glass py-4 px-3" style="width: 280px; z-index: 100;">
        <div class="mb-5 px-3">
            <img src="/assets/images/logo.png" alt="VlogStudents" width="140" class="pulse-neon">
        </div>
        
        <nav class="sidebar-nav flex-grow-1">
            <a href="#/home/feed" class="nav-link-desktop active">
                <i class="fas fa-home"></i> <span>Para ti</span>
            </a>
            <a href="#/search/global" class="nav-link-desktop">
                <i class="fas fa-compass"></i> <span>Explorar</span>
            </a>
            <a href="#/following" class="nav-link-desktop">
                <i class="fas fa-users"></i> <span>A seguir</span>
            </a>
            <a href="#/chat/list" class="nav-link-desktop">
                <i class="fas fa-comment-alt"></i> <span>Mensagens</span>
            </a>
            <a href="#/profile/view" class="nav-link-desktop">
                <i class="fas fa-user"></i> <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer px-3 opacity-50">
            <p class="text-xs mb-1">Empresa • Programa</p>
            <p class="text-xs mb-1">Termos e Políticas</p>
            <p class="text-xs">© 2026 VlogStudents</p>
        </div>
    </aside>

    <!-- 2. MAIN FEED CONTAINER (PAGINAÇÃO VERTICAL) -->
    <div id="feed-scroll-viewport" class="h-100 overflow-y-scroll snap-y-mandatory no-scrollbar">
        <!-- REELS INJETADOS VIA MODULES/FEED.JS -->
    </div>

    <!-- 3. TEMPLATE INDUSTRIAL (RECURSIVE BUILDER) -->
    <template id="tiktok-reel-template">
        <div class="reel-item h-100 w-100 snap-start d-flex justify-content-center" data-reel-id="{{id}}">
            
            <!-- LAYOUT MOBILE (FULLSCREEN) -->
            <div class="mobile-layout d-lg-none w-100 h-100 position-relative">
                <video id="video-m-{{id}}" class="vlog-video-main w-100 h-100 object-fit-cover" loop playsinline>
                    <source src="{{video_url}}" type="video/mp4">
                </video>

                <!-- Action Column (Right) -->
                <div class="mobile-actions position-absolute d-flex flex-column gap-4">
                    <div class="author-stack">
                        <img src="{{author_picture}}" class="rounded-circle border-neon-thin" width="48" height="48" onclick="VlogMain.navigateToProfile({{author_id}})">
                        <div class="follow-plus-btn">+</div>
                    </div>
                    <div class="action-item" onclick="VlogFeed.toggleLike({{id}})">
                        <div class="icon-circle {{liked_class}}"><i class="fas fa-heart"></i></div>
                        <span>{{likes}}</span>
                    </div>
                    <div class="action-item" onclick="VlogFeed.openComments({{id}})">
                        <div class="icon-circle"><i class="fas fa-comment-dots"></i></div>
                        <span>{{comments}}</span>
                    </div>
                    <div class="action-item">
                        <div class="icon-circle"><i class="fas fa-share"></i></div>
                        <span>Voices</span>
                    </div>
                </div>

                <!-- Info Section (Bottom Left) -->
                <div class="mobile-info position-absolute p-4">
                    <h5 class="fw-black mb-1">@{{author_handle}}</h5>
                    <p class="text-small mb-3">{{title}}</p>
                    <div class="badge-vlog-sm"><i class="fas fa-school me-2"></i>{{university}}</div>
                </div>
            </div>

            <!-- LAYOUT DESKTOP (SPLIT VIEW) -->
            <div class="desktop-layout d-none d-lg-flex w-100 h-100 align-items-center justify-content-center px-5" style="margin-left: 280px;">
                <div class="desktop-player-card glass-morphism rounded-xl d-flex overflow-hidden" style="width: 1100px; height: 85vh;">
                    
                    <!-- LADO ESQUERDO: VIDEO -->
                    <div class="player-pane flex-grow-1 bg-black position-relative">
                        <video id="video-d-{{id}}" class="vlog-video-main w-100 h-100 object-fit-contain" loop playsinline>
                            <source src="{{video_url}}" type="video/mp4">
                        </video>
                        <div class="video-overlay-controls">
                            <button class="btn-mute" onclick="VlogFeed.toggleMute({{id}})"><i class="fas fa-volume-up"></i></button>
                        </div>
                    </div>

                    <!-- LADO DIREITO: INTERAÇÕES (TIKTOK STYLE) -->
                    <div class="interaction-pane d-flex flex-column border-start-glass bg-surface-dark" style="width: 450px;">
                        <div class="p-4 border-bottom-glass">
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="d-flex align-items-center gap-3">
                                    <img src="{{author_picture}}" class="rounded-circle" width="48" height="48">
                                    <div>
                                        <h6 class="mb-0 fw-black">@{{author_handle}}</h6>
                                        <small class="text-muted">{{university}}</small>
                                    </div>
                                </div>
                                <button class="btn-vlog-primary btn-vlog-pill">A seguir</button>
                            </div>
                            <p class="text-white fw-medium">{{title}}</p>
                            <div class="d-flex gap-4 mt-4">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="icon-circle-sm bg-glass"><i class="fas fa-heart"></i></div>
                                    <span class="fw-bold">{{likes}}</span>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="icon-circle-sm bg-glass"><i class="fas fa-comment"></i></div>
                                    <span class="fw-bold">{{comments}}</span>
                                </div>
                            </div>
                        </div>

                        <!-- COMENTÁRIOS COM SCROLL INDEPENDENTE -->
                        <div class="comments-scroll-area flex-grow-1 overflow-y-auto p-4 no-scrollbar">
                            <div id="comments-container-{{id}}">
                                <!-- Comentários via JS -->
                            </div>
                        </div>

                        <!-- INPUT DE COMENTÁRIO FIXO -->
                        <div class="p-3 border-top-glass">
                            <div class="input-glass-group d-flex align-items-center gap-2 px-3 py-2 rounded-lg">
                                <input type="text" class="flex-grow-1 bg-transparent text-white border-0" placeholder="Adicionar comentário...">
                                <button class="text-neon fw-bold">Publicar</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </template>

    <!-- 4. MODAL DE DISCUSSÕES MOBILE (BOTTOM SHEET) -->
    <div id="mobile-comments-sheet" class="vlog-bottom-sheet d-none">
        <div class="modal-handle"></div>
        <div id="mobile-comments-content" class="p-4"></div>
    </div>

</div>

<!-- CSS INTEGRADO (PREMIUM DESKTOP & MOBILE FIDELITY) -->
<style>
    /* RESET E SNAPPING */
    #feed-scroll-viewport {
        scroll-snap-type: y mandatory;
        height: 100vh;
        width: 100vw;
    }
    .reel-item { scroll-snap-align: start; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* SIDEBAR DESKTOP (TIKTOK STYLE) */
    .nav-link-desktop {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px 16px;
        border-radius: 8px;
        color: white;
        font-weight: 700;
        font-size: 18px;
        transition: background 0.2s ease;
        margin-bottom: 8px;
    }
    .nav-link-desktop i { font-size: 24px; width: 30px; text-align: center; }
    .nav-link-desktop:hover { background: rgba(255, 255, 255, 0.05); }
    .nav-link-desktop.active { color: var(--primary-neon); }

    /* MOBILE ACTION COLUMN */
    .mobile-actions {
        right: 15px;
        bottom: 120px;
        z-index: 10;
        align-items: center;
    }
    .action-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        gap: 5px;
    }
    .action-item span { font-size: 12px; font-weight: 900; text-shadow: 0 2px 4px black; }
    
    .icon-circle {
        width: 48px; height: 48px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px;
    }

    .author-stack { position: relative; margin-bottom: 10px; }
    .follow-plus-btn {
        position: absolute; bottom: -8px; left: 50%;
        transform: translateX(-50%);
        background: var(--primary-neon);
        color: black; width: 22px; height: 22px;
        border-radius: 50%; font-weight: 900;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid black; font-size: 14px;
    }

    /* DESKTOP SPLIT COMPONENTS */
    .border-end-glass { border-right: 1px solid rgba(255, 255, 255, 0.1); }
    .border-start-glass { border-left: 1px solid rgba(255, 255, 255, 0.1); }
    .border-bottom-glass { border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .border-top-glass { border-top: 1px solid rgba(255, 255, 255, 0.1); }
    
    .icon-circle-sm {
        width: 36px; height: 36px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
    }
    .bg-glass { background: rgba(255, 255, 255, 0.08); }

    .input-glass-group {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .video-overlay-controls {
        position: absolute; bottom: 20px; right: 20px;
    }
    .btn-mute {
        background: rgba(0,0,0,0.5); color: white; border: none;
        width: 40px; height: 40px; border-radius: 50%;
    }

    /* ANIMATIONS */
    .pulse-neon { animation: neon-glow 2s infinite ease-in-out; }
    @keyframes neon-glow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; filter: drop-shadow(0 0 10px var(--primary-neon)); }
    }
</style>

<!-- JS KERNEL: ORQUESTRADOR RESPONSIVO -->
<script>
    const VlogFeed = {
        _reels: [],
        _observer: null,
        _activeVideo: null,

        init() {
            console.log("[FEED] Inicializando TikTok Engine v200.0.0");
            this._setupResponsiveDetection();
            this._loadFeedData();
            this._initializeAutoplay();
        },

        async _loadFeedData() {
            try {
                const response = await window.vlogApi.reels.getFeed();
                if (response.success) {
                    this._reels = response.data;
                    this._renderFeed();
                }
            } catch (e) {
                console.error("[FEED_ERR]", e);
            }
        },

        _renderFeed() {
            const container = document.getElementById('feed-scroll-viewport');
            const template = document.getElementById('tiktok-reel-template').innerHTML;

            container.innerHTML = this._reels.map(reel => {
                let html = template;
                const replacements = {
                    '{{id}}': reel.id,
                    '{{video_url}}': window.vlogMedia.resolveUrl(reel.drive_file_id),
                    '{{thumbnail_url}}': window.vlogMedia.resolveUrl(reel.thumbnail_id),
                    '{{author_picture}}': window.vlogMedia.resolveUrl(reel.author_picture),
                    '{{author_handle}}': reel.author_name.replace(/\s/g, '').toLowerCase(),
                    '{{author_id}}': reel.author_id,
                    '{{title}}': reel.title,
                    '{{university}}': reel.author_university,
                    '{{likes}}': VlogFormat.compact(reel.likes_count),
                    '{{comments}}': VlogFormat.compact(reel.comments_count),
                    '{{liked_class}}': reel.is_liked ? 'text-error' : ''
                };

                Object.keys(replacements).forEach(key => {
                    html = html.split(key).join(replacements[key]);
                });
                return html;
            }).join('');

            this._setupVideoIntersection();
        },

        _setupVideoIntersection() {
            const options = { threshold: 0.6 };
            this._observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const id = video.id.split('-').pop();

                    if (entry.isIntersecting) {
                        if (this._activeVideo && this._activeVideo !== video) {
                            this._activeVideo.pause();
                        }
                        video.play().catch(() => {});
                        this._activeVideo = video;
                        
                        // Se for Desktop, carrega comentários lateralmente
                        if (window.innerWidth >= 1024) {
                            this.loadCommentsSidebar(id);
                        }
                    } else {
                        video.pause();
                    }
                });
            }, options);

            document.querySelectorAll('.vlog-video-main').forEach(v => this._observer.observe(v));
        },

        async loadCommentsSidebar(reelId) {
            const container = document.getElementById(`comments-container-${reelId}`);
            if (!container) return;

            try {
                const response = await window.vlogApi.social.getComments(reelId);
                if (response.success) {
                    container.innerHTML = response.data.map(c => `
                        <div class="comment-item d-flex gap-3 mb-4 animate__animated animate__fadeIn">
                            <img src="${window.vlogMedia.resolveUrl(c.user_avatar)}" class="rounded-circle" width="36" height="36">
                            <div class="flex-grow-1">
                                <p class="mb-1 fw-bold text-xs">@${c.user_name}</p>
                                <p class="mb-1 text-white text-small">${c.content}</p>
                                <div class="d-flex gap-3 text-muted" style="font-size: 10px;">
                                    <span>${VlogFormat.relativeTime(c.created_at)}</span>
                                    <span class="clickable">Responder</span>
                                </div>
                            </div>
                            <div class="text-center">
                                <i class="far fa-heart opacity-50"></i>
                                <small class="d-block text-xs">0</small>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        },

        toggleLike(reelId) {
            window.vlogApi.social.toggleLike(reelId).then(res => {
                const icon = document.querySelector(`#like-icon-${reelId}`);
                if (icon) icon.classList.toggle('text-error', res.isLiked);
                if ("vibrate" in navigator) navigator.vibrate(50);
            });
        },

        toggleMute(reelId) {
            const videos = document.querySelectorAll('.vlog-video-main');
            videos.forEach(v => v.muted = !v.muted);
        },

        _setupResponsiveDetection() {
            window.addEventListener('resize', () => {
                const container = document.getElementById('feed-orchestrator');
                if (window.innerWidth < 1024) {
                    container.classList.remove('desktop-mode');
                    container.classList.add('mobile-mode');
                } else {
                    container.classList.remove('mobile-mode');
                    container.classList.add('desktop-mode');
                }
            });
        }
    };

    // Inicialização Master
    VlogFeed.init();
</script>
