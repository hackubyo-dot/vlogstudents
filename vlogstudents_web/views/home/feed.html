<!-- 
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - FEED ENGINE v210.0.0
 * FULL TIKTOK CLONE | DUAL-LAYOUT RESPONSIVE | NEON DB DATA BINDING
 * 
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 * 
 * Engenharia de Fluxo e Sincronia:
 * - Real-Time Data Fetch: Consumo direto da API /reels com tratamento de tipos.
 * - Media Resolver Hub: Converte drive_file_id em stream URLs do Supabase.
 * - Desktop Split-View: Sidebar (Left) + Player (Center) + Interaction (Right).
 * - Mobile Full-Screen: Vídeo absoluto com Action Column flutuante.
 * - Intersection Observer Pro: Gerencia Play/Pause automático para economia de CPU.
 * - Auto-Pause Social: Pausa o vídeo automaticamente ao abrir comentários.
 * - Staggered Rendering: Carregamento em cascata para performance industrial.
 * ============================================================================
-->

<div id="feed-orchestrator" class="vh-100 vw-100 bg-black overflow-hidden position-relative">

    <!-- 1. CAMADA DESKTOP: SIDEBAR ESQUERDA (IMAGE MATCH 2) -->
    <aside id="desktop-sidebar" class="d-none d-lg-flex flex-column position-fixed h-100 border-end-glass py-4 px-3" style="width: 280px; z-index: 100; background: #000;">
        <div class="mb-5 px-3">
            <img src="/assets/images/logo.png" alt="VlogStudents" width="150" class="pulse-neon clickable" onclick="location.reload()">
        </div>
        
        <nav class="sidebar-nav flex-grow-1">
            <a href="#/home/feed" class="nav-link-desktop active">
                <i class="fas fa-home"></i> <span>Para ti</span>
            </a>
            <a href="#/search/search-people" class="nav-link-desktop">
                <i class="fas fa-compass"></i> <span>Explorar</span>
            </a>
            <a href="#/chat/chat-list" class="nav-link-desktop">
                <i class="fas fa-comment-alt"></i> <span>Mensagens</span>
            </a>
            <a href="#/profile/view-profile" class="nav-link-desktop">
                <i class="fas fa-user"></i> <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer px-3 opacity-50 text-white">
            <p class="text-xs mb-1 fw-bold">Empresa • Programa</p>
            <p class="text-xs mb-1 fw-bold">Termos e Políticas</p>
            <p class="text-xs fw-black text-neon">© 2026 VlogStudents Enterprise</p>
        </div>
    </aside>

    <!-- 2. SCROLL VIEWPORT (CONTAINER DE REELS) -->
    <div id="feed-scroll-viewport" class="h-100 overflow-y-scroll snap-y-mandatory no-scrollbar">
        <!-- O LOADER APARECE ATÉ O DATA-FETCH SER CONCLUÍDO -->
        <div id="feed-initial-loader" class="h-100 w-100 d-flex flex-column align-items-center justify-content-center">
            <div class="spinner-border text-neon" style="width: 3.5rem; height: 3.5rem; border-width: 0.25em;"></div>
            <h5 class="text-neon fw-black mt-4 ls-vwide animate__animated animate__pulse animate__infinite">MINERANDO VLOGS...</h5>
        </div>
    </div>

    <!-- 3. TEMPLATE INDUSTRIAL (TIKTOK ARCHITECTURE) -->
    <!-- Este template é o DNA visual de cada Vlog no sistema -->
    <template id="tiktok-reel-template">
        <div class="reel-item h-100 w-100 snap-start d-flex justify-content-center" data-reel-id="{{id}}">
            
            <!-- LAYOUT MOBILE (ESTILO IMAGEM 1) -->
            <div class="mobile-layout d-lg-none w-100 h-100 position-relative">
                <video id="video-m-{{id}}" class="vlog-video-main w-100 h-100 object-fit-cover" loop playsinline preload="auto">
                    <source src="{{video_url}}" type="video/mp4">
                </video>

                <!-- VIGNETTE OVERLAY -->
                <div class="mobile-vignette"></div>

                <!-- Action Column (Right Side) -->
                <div class="mobile-actions position-absolute d-flex flex-column gap-4">
                    <div class="author-stack">
                        <img src="{{author_picture}}" class="rounded-circle border-neon-thin shadow-neon" width="52" height="52" onclick="location.hash='#/profile/view-profile?id={{author_id}}'">
                        <div class="follow-plus-btn {{follow_hidden}}">+</div>
                    </div>
                    
                    <div class="action-item" onclick="VlogFeedView.handleLike({{id}})">
                        <div class="icon-circle {{liked_class}}"><i class="fas fa-heart"></i></div>
                        <span class="count-label">{{likes}}</span>
                    </div>

                    <div class="action-item" onclick="VlogFeedView.handleComments({{id}})">
                        <div class="icon-circle"><i class="fas fa-comment-dots"></i></div>
                        <span class="count-label">{{comments}}</span>
                    </div>

                    <div class="action-item" onclick="VlogFeedView.handleShare({{id}})">
                        <div class="icon-circle"><i class="fas fa-share"></i></div>
                        <span class="count-label">Voices</span>
                    </div>
                </div>

                <!-- Meta-Data (Bottom Left) -->
                <div class="mobile-info position-absolute p-4 w-75">
                    <h5 class="fw-black text-white mb-2 ls-tight">@{{author_handle}}</h5>
                    <p class="text-white text-small fw-medium mb-3">{{title}}</p>
                    <div class="badge-vlog-sm">
                        <i class="fas fa-school me-2 text-neon"></i>
                        <span class="text-uppercase fw-black" style="font-size: 9px;">{{university}}</span>
                    </div>
                </div>
            </div>

            <!-- LAYOUT DESKTOP (ESTILO IMAGEM 2) -->
            <div class="desktop-layout d-none d-lg-flex w-100 h-100 align-items-center justify-content-center px-5" style="padding-left: 320px !important;">
                <div class="desktop-player-card glass-morphism rounded-xl d-flex overflow-hidden animate__animated animate__zoomIn" style="width: 1000px; height: 85vh;">
                    
                    <!-- LEFT SIDE: PLAYER CORE -->
                    <div class="player-pane flex-grow-1 bg-black position-relative d-flex align-items-center">
                        <video id="video-d-{{id}}" class="vlog-video-main w-100 h-100 object-fit-contain" loop playsinline preload="auto">
                            <source src="{{video_url}}" type="video/mp4">
                        </video>
                        <div class="video-overlay-controls p-4 position-absolute bottom-0 w-100 d-flex justify-content-between align-items-center">
                            <button class="btn-mute glass-morphism" onclick="VlogFeedView.toggleMute({{id}})">
                                <i class="fas fa-volume-up" id="mute-icon-{{id}}"></i>
                            </button>
                            <div class="video-progress-bar flex-grow-1 mx-4">
                                <div class="progress-bg rounded-pill" style="height: 4px; background: rgba(255,255,255,0.2);">
                                    <div id="prog-{{id}}" class="progress-fill bg-neon h-100 rounded-pill" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: INTERACTION HUB -->
                    <div class="interaction-pane d-flex flex-column border-start-glass bg-surface-dark" style="width: 420px;">
                        <!-- Profile Header -->
                        <div class="p-4 border-bottom-glass">
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="d-flex align-items-center gap-3 clickable" onclick="location.hash='#/profile/view-profile?id={{author_id}}'">
                                    <img src="{{author_picture}}" class="rounded-circle border-neon-thin" width="48" height="48">
                                    <div>
                                        <h6 class="mb-0 fw-black text-white">@{{author_handle}}</h6>
                                        <small class="text-muted fw-bold">{{university}}</small>
                                    </div>
                                </div>
                                <button class="btn-vlog-primary btn-vlog-pill px-4">SEGUIR</button>
                            </div>
                            <p class="text-white fw-medium ls-wide" style="font-size: 14px;">{{title}}</p>
                            <div class="d-flex gap-4 mt-4">
                                <div class="d-flex align-items-center gap-2 clickable" onclick="VlogFeedView.handleLike({{id}})">
                                    <div class="icon-circle-sm bg-glass {{liked_class}}"><i class="fas fa-heart"></i></div>
                                    <span class="fw-black text-small">{{likes}}</span>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="icon-circle-sm bg-glass"><i class="fas fa-comment"></i></div>
                                    <span class="fw-black text-small">{{comments}}</span>
                                </div>
                            </div>
                        </div>

                        <!-- DISCUSSION AREA (SCROLL INDEPENDENTE) -->
                        <div class="comments-scroll-area flex-grow-1 overflow-y-auto p-4 no-scrollbar">
                            <div id="comments-container-{{id}}" class="d-flex flex-column gap-3">
                                <div class="text-center p-5 opacity-20">
                                    <i class="fas fa-comment-slash fa-2x"></i>
                                    <p class="text-xs fw-bold mt-2">Carregando discussões...</p>
                                </div>
                            </div>
                        </div>

                        <!-- STICKY INPUT BAR -->
                        <div class="p-3 border-top-glass bg-black bg-opacity-20">
                            <div class="input-glass-group d-flex align-items-center gap-3 px-3 py-2 rounded-lg border-glass">
                                <input type="text" id="input-{{id}}" class="flex-grow-1 bg-transparent text-white border-0 text-small" placeholder="Adicionar Voice no campus...">
                                <button class="text-neon fw-black text-xs ls-wide" onclick="VlogFeedView.postDesktopComment({{id}})">PUBLICAR</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </template>

    <!-- 4. MODAL DE DISCUSSÕES MOBILE (BOTTOM SHEET) -->
    <div id="mobile-comments-overlay" class="vlog-bottom-sheet d-none">
        <div class="modal-handle"></div>
        <div id="mobile-comments-root"></div>
    </div>

</div>

<!-- CSS ESPECÍFICO PARA ALTA FIDELIDADE (TIKTOK MASTER) -->
<style>
    /* VIEWPORT & SNAPPING */
    #feed-scroll-viewport {
        scroll-snap-type: y mandatory;
        height: 100vh;
        width: 100vw;
        background: #000;
        scroll-behavior: smooth;
    }
    .reel-item { scroll-snap-align: start; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* VIGNETTES */
    .mobile-vignette {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.4) 100%);
        pointer-events: none;
    }

    /* ACTION BUTTONS (MOBILE) */
    .mobile-actions {
        right: 15px; bottom: 130px; z-index: 50;
    }
    .action-item {
        display: flex; flex-direction: column; align-items: center; color: white;
    }
    .count-label {
        font-size: 11px; font-weight: 900; text-shadow: 0 2px 4px black; margin-top: 5px;
    }
    .icon-circle {
        width: 50px; height: 50px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; transition: transform 0.2s ease;
    }
    .icon-circle:active { transform: scale(0.9); }

    /* DESKTOP SPLIT DESIGN */
    .desktop-player-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 50px 100px rgba(0,0,0,0.8);
    }
    .border-start-glass { border-left: 1px solid rgba(255, 255, 255, 0.1); }
    .border-bottom-glass { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .bg-surface-dark { background: #121212; }
    
    .icon-circle-sm {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .bg-glass { background: rgba(255, 255, 255, 0.1); }

    /* INDICADORES */
    .badge-vlog-sm {
        background: rgba(204, 255, 0, 0.1);
        border: 1px solid var(--primary-neon);
        color: var(--primary-neon);
        padding: 6px 12px; border-radius: 4px;
        display: inline-flex; align-items: center;
    }

    .text-error { color: #FF3B30 !important; }
    .pulse-neon { animation: neonPulse 2s infinite ease-in-out; }
</style>

<!-- LÓGICA DE VISUALIZAÇÃO E ORQUESTRAÇÃO DE DADOS -->
<script>
    const VlogFeedView = {
        _reels: [],
        _activeObserver: null,
        _isMuted: false,

        /**
         * INICIALIZAÇÃO: Dispara a busca real no Neon DB
         */
        async init() {
            console.log("%c[FEED] Master Engine Online. Minerando dados...", "color: #CCFF00; font-weight: bold;");
            this._showLoader(true);

            try {
                // Sincroniza com o Módulo Core para obter dados reais
                const response = await window.vlogApi.reels.getFeed(1);
                
                if (response.success) {
                    this._reels = response.data;
                    this._renderStream();
                } else {
                    throw new Error("API negou acesso aos vlogs.");
                }
            } catch (error) {
                console.error("[FEED_FATAL]", error);
                this._renderError();
            } finally {
                this._showLoader(false);
            }
        },

        _renderStream() {
            const viewport = document.getElementById('feed-scroll-viewport');
            const template = document.getElementById('tiktok-reel-template').innerHTML;

            if (this._reels.length === 0) {
                viewport.innerHTML = this._getEmptyHTML();
                return;
            }

            // Injeção Atômica dos Vlogs
            viewport.innerHTML = this._reels.map(reel => {
                let html = template;
                
                // Mapeamento de propriedades reais do Neon DB
                const dataMap = {
                    '{{id}}': reel.id,
                    '{{video_url}}': window.vlogMedia.resolveUrl(reel.drive_file_id),
                    '{{thumbnail_url}}': window.vlogMedia.resolveUrl(reel.thumbnail_id),
                    '{{author_picture}}': window.vlogMedia.resolveUrl(reel.author_picture),
                    '{{author_handle}}': reel.author_name.replace(/\s/g, '').toLowerCase(),
                    '{{author_id}}': reel.author_id,
                    '{{title}}': reel.title,
                    '{{university}}': reel.author_university || 'CAMPUS DIGITAL',
                    '{{likes}}': VlogFormat.compact(reel.likes_count),
                    '{{comments}}': VlogFormat.compact(reel.comments_count),
                    '{{liked_class}}': reel.is_liked ? 'text-error' : '',
                    '{{follow_hidden}}': reel.is_followed ? 'd-none' : ''
                };

                Object.keys(dataMap).forEach(key => {
                    html = html.split(key).join(dataMap[key]);
                });
                return html;
            }).join('');

            this._initializeIntersectionObserver();
        },

        /**
         * MOTOR DE REPRODUÇÃO: Intersection Observer (Auto Play/Pause)
         */
        _initializeIntersectionObserver() {
            const options = { threshold: 0.7 }; // O vídeo precisa estar 70% visível
            
            this._activeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const id = video.id.split('-').pop();

                    if (entry.isIntersecting) {
                        video.play().catch(e => console.warn("[MEDIA] Autoplay bloqueado pelo navegador."));
                        
                        // Telemetria: Registra visualização no Neon
                        window.vlogApi.reels.trackView(id);

                        // Se for Desktop, carrega as discussões laterais
                        if (window.innerWidth >= 1024) {
                            this._loadSidebarComments(id);
                        }
                    } else {
                        video.pause();
                        video.currentTime = 0; // Reinicia para economia de buffer
                    }
                });
            }, options);

            document.querySelectorAll('.vlog-video-main').forEach(v => this._activeObserver.observe(v));
        },

        async _loadSidebarComments(reelId) {
            const container = document.getElementById(`comments-container-${reelId}`);
            if (!container) return;

            try {
                const res = await window.vlogApi.social.getComments(reelId);
                if (res.success && res.data.length > 0) {
                    container.innerHTML = res.data.map(c => `
                        <div class="comment-item d-flex gap-3 mb-4 animate__animated animate__fadeIn">
                            <img src="${window.vlogMedia.resolveUrl(c.user_avatar)}" class="rounded-circle" width="36" height="36">
                            <div class="flex-grow-1">
                                <p class="mb-0 text-white fw-black text-xs">@${c.user_name}</p>
                                <p class="mb-1 text-secondary text-small">${c.content}</p>
                                <small class="opacity-30 fw-bold" style="font-size: 9px;">${VlogFormat.relativeTime(c.created_at)}</small>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p class="text-center text-muted text-xs p-5">Nenhuma Voice nesta discussão ainda.</p>`;
                }
            } catch (e) {
                container.innerHTML = `<p class="text-center text-error text-xs p-5">Erro ao carregar discussões.</p>`;
            }
        },

        handleLike(id) {
            window.vlogApi.social.toggleLike(id).then(res => {
                const elements = document.querySelectorAll(`#like-icon-${id}`);
                elements.forEach(el => el.classList.toggle('text-error', res.isLiked));
                if ("vibrate" in navigator) navigator.vibrate(50);
            });
        },

        handleComments(id) {
            // Em Mobile, abre o BottomSheet. Em Desktop já está na lateral.
            if (window.innerWidth < 1024) {
                const overlay = document.getElementById('mobile-comments-overlay');
                overlay.classList.remove('d-none');
                // Aqui carregaria a view de comentários externa...
            }
        },

        toggleMute(id) {
            this._isMuted = !this._isMuted;
            const icon = document.getElementById(`mute-icon-${id}`);
            const videos = document.querySelectorAll('video');
            
            videos.forEach(v => v.muted = this._isMuted);
            if (icon) icon.className = this._isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        },

        _showLoader(show) {
            const loader = document.getElementById('feed-initial-loader');
            if (loader) loader.style.display = show ? 'flex' : 'none';
        },

        _getEmptyHTML() {
            return `
                <div class="h-100 w-100 d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <i class="fas fa-video-slash text-white opacity-20 fa-4x mb-4"></i>
                    <h3 class="fw-black">CAMPUS VAZIO</h3>
                    <p class="text-muted">Ninguém postou Vlogs hoje. Seja o primeiro influenciador!</p>
                    <button class="btn-vlog-primary mt-4 px-5" onclick="location.hash='#/post/upload'">POSTAR VLOG</button>
                </div>
            `;
        },

        _renderError() {
            const viewport = document.getElementById('feed-scroll-viewport');
            viewport.innerHTML = `
                <div class="h-100 w-100 d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <i class="fas fa-exclamation-triangle text-error fa-3x mb-4"></i>
                    <h4 class="fw-black">FALHA NA MINERAÇÃO</h4>
                    <p class="text-muted">Não conseguimos conectar ao banco de dados do campus.</p>
                    <button class="btn-vlog-primary mt-4" onclick="VlogFeedView.init()">TENTAR NOVAMENTE</button>
                </div>
            `;
        }
    };

    // Auto-inicialização do módulo de visualização
    VlogFeedView.init();
</script>
