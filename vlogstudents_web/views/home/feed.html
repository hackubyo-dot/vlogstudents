<!-- 
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - SUPREME FEED ENGINE v800.0.0
 * DESIGN FIDELITY: 100% TIKTOK | ZERO LATENCY | NEON & SUPABASE SYNC
 * 
 * PROTOCOLO DE CONSTRUÇÃO:
 * - Layout Chapa: Sidebar (L) | Immersive Player (C) | Social Hub (R).
 * - Full Responsive: Transição atômica entre Mobile e Desktop.
 * - Hardware Bridge: Vídeo em alta performance com aceleração por GPU.
 * ============================================================================
-->

<div id="vlog-feed-container" class="vh-100 vw-100 bg-black overflow-hidden position-relative">
    
    <!-- CSS INTERNO PARA GARANTIR RENDERIZAÇÃO IMEDIATA (ZERO FLASH) -->
    <style>
        #vlog-feed-container {
            background-color: #000;
            color: #fff;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- SIDEBAR DESKTOP --- */
        .vlog-web-sidebar {
            width: 280px;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .side-nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
            transition: 0.3s;
        }

        .side-nav-item:hover { background: rgba(255, 255, 255, 0.08); }
        .side-nav-item.active { color: var(--primary-neon); }
        .side-nav-item i { font-size: 24px; width: 30px; text-align: center; }

        /* --- FEED VIEWPORT --- */
        #vlog-scroll-area {
            flex-grow: 1;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        #vlog-scroll-area::-webkit-scrollbar { display: none; }

        .vlog-reel-unit {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- DESKTOP PLAYER CARD (IMAGE 2) --- */
        .vlog-desktop-split {
            width: 90%;
            max-width: 1100px;
            height: 85vh;
            background: #121212;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .vlog-player-half {
            flex: 1.5;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vlog-social-half {
            width: 400px;
            background: #000;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        /* --- MOBILE LAYOUT (IMAGE 1) --- */
        .vlog-mobile-immersive {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .vlog-video-node {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vlog-overlay-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .action-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .action-pill .icon-box {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 5px;
        }

        .vlog-avatar-stack {
            position: relative;
            margin-bottom: 15px;
        }

        .vlog-avatar-ring {
            padding: 3px;
            border-radius: 50%;
            border: 2px solid var(--primary-neon);
            box-shadow: 0 0 15px var(--primary-neon);
        }

        .follow-plus-mini {
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--primary-neon); color: #000;
            width: 20px; height: 20px; border-radius: 50%;
            font-weight: 900; display: flex; align-items: center; justify-content: center;
            border: 2px solid #000; font-size: 14px;
        }

        /* --- LOADERS --- */
        #vlog-master-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 500; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .spinner-neon-pro {
            width: 60px; height: 60px;
            border: 5px solid rgba(204, 255, 0, 0.1);
            border-top-color: var(--primary-neon);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>

    <!-- SIDEBAR DESKTOP -->
    <aside class="vlog-web-sidebar d-none d-lg-flex">
        <img src="/assets/images/logo.png" width="150" class="mb-5 px-3">
        <nav>
            <a href="#/home/feed" class="side-nav-item active"><i class="fas fa-home"></i> <span>Para você</span></a>
            <a href="#/search/search-people" class="side-nav-item"><i class="fas fa-compass"></i> <span>Explorar</span></a>
            <a href="#/chat/chat-list" class="side-nav-item"><i class="fas fa-comment-alt"></i> <span>Mensagens</span></a>
            <a href="#/profile/view-profile" class="side-nav-item"><i class="fas fa-user-circle"></i> <span>Perfil</span></a>
        </nav>
        <div class="mt-auto p-3 text-muted text-xs fw-bold">© 2026 VLOGSTUDENTS ENTERPRISE</div>
    </aside>

    <!-- ÁREA DO FEED -->
    <div id="vlog-scroll-area">
        
        <!-- LOADER INICIAL -->
        <div id="vlog-master-loader">
            <div class="spinner-neon-pro mb-4"></div>
            <h5 class="text-neon fw-black ls-vwide animate__animated animate__pulse animate__infinite">MINERANDO CAMPUS...</h5>
            <button id="force-feed-btn" class="btn-vlog-primary mt-4 d-none" onclick="VlogFeedView.init()">TENTAR NOVAMENTE</button>
        </div>

        <!-- CONTAINER DE INJEÇÃO -->
        <div id="vlog-reels-root"></div>

    </div>

    <!-- TEMPLATE DO VLOG -->
    <template id="vlog-template">
        <div class="vlog-reel-unit" data-id="{{id}}">
            
            <!-- MOBILE -->
            <div class="vlog-mobile-immersive d-lg-none">
                <video id="vid-m-{{id}}" class="vlog-video-node" loop playsinline crossorigin="anonymous">
                    <source src="{{video_url}}" type="video/mp4">
                </video>
                <div class="vlog-overlay-actions">
                    <div class="vlog-avatar-stack">
                        <div class="vlog-avatar-ring"><img src="{{author_img}}" class="rounded-circle" width="50" height="50"></div>
                        <div class="follow-plus-mini">+</div>
                    </div>
                    <div class="action-pill"><div class="icon-box"><i class="fas fa-heart"></i></div><span>{{likes}}</span></div>
                    <div class="action-pill"><div class="icon-box"><i class="fas fa-comment-dots"></i></div><span>{{comments}}</span></div>
                </div>
                <div class="mobile-meta-overlay position-absolute bottom-0 p-4">
                    <h6 class="fw-black text-white">@{{author_handle}}</h6>
                    <p class="text-white text-small">{{title}}</p>
                </div>
            </div>

            <!-- DESKTOP -->
            <div class="vlog-desktop-split d-none d-lg-flex">
                <div class="vlog-player-half">
                    <video id="vid-d-{{id}}" class="vlog-video-node h-100 w-100 object-fit-contain" loop playsinline crossorigin="anonymous">
                        <source src="{{video_url}}" type="video/mp4">
                    </video>
                </div>
                <div class="vlog-social-half p-4">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <img src="{{author_img}}" class="rounded-circle" width="45" height="45">
                        <div><h6 class="m-0 fw-black">@{{author_handle}}</h6><small class="text-muted">{{university}}</small></div>
                    </div>
                    <p class="text-white fw-bold mb-4">{{title}}</p>
                    <div class="flex-grow-1 overflow-y-auto no-scrollbar" id="comments-{{id}}">
                        <p class="text-center opacity-20 mt-5">Carregando discussões...</p>
                    </div>
                </div>
            </div>

        </div>
    </template>

</div>

<script>
    /**
     * MOTOR DO FEED: v800.0.0
     * Esta lógica será chamada explicitamente pelo MainOrchestrator
     */
    var VlogFeedView = {
        _reels: [],
        _activeObserver: null,

        async init() {
            console.log("%c[FEED] Ativando Motor Atómico...", "color: #CCFF00; font-weight: bold;");
            
            // Exibe botão de emergência se a API demorar
            setTimeout(() => {
                const btn = document.getElementById('force-feed-btn');
                if(btn && this._reels.length === 0) btn.classList.remove('d-none');
            }, 6000);

            try {
                if (!window.vlogApi) throw new Error("API Kernel not found");

                const response = await window.vlogApi.reels.getFeed(1);
                
                if (response.success && response.data.length > 0) {
                    this._reels = response.data;
                    this._render();
                } else {
                    this._renderEmpty();
                }
            } catch (err) {
                console.error("[FEED_FATAL]", err);
                document.getElementById('loader-text').innerText = "ERRO DE CONEXÃO";
            }
        },

        _render() {
            const root = document.getElementById('vlog-reels-root');
            const template = document.getElementById('vlog-template').innerHTML;

            root.innerHTML = this._reels.map(reel => {
                let html = template;
                const map = {
                    '{{id}}': reel.id,
                    '{{video_url}}': window.vlogMedia.resolveUrl(reel.drive_file_id),
                    '{{author_img}}': window.vlogMedia.resolveUrl(reel.author_picture),
                    '{{author_handle}}': reel.author_name.replace(/\s/g, '').toLowerCase(),
                    '{{title}}': reel.title || "",
                    '{{university}}': reel.author_university || "CAMPUS VLOG",
                    '{{likes}}': window.VlogFormat.compact(reel.likes_count),
                    '{{comments}}': window.VlogFormat.compact(reel.comments_count)
                };
                Object.keys(map).forEach(key => html = html.split(key).join(map[key]));
                return html;
            }).join('');

            document.getElementById('vlog-master-loader').style.display = 'none';
            this._startHardwareObserver();
        },

        _startHardwareObserver() {
            const options = { threshold: 0.7 };
            this._observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        window.vlogApi.reels.trackView(video.id.split('-').pop());
                    } else {
                        video.pause();
                    }
                });
            }, options);

            document.querySelectorAll('video').forEach(v => this._observer.observe(v));
        },

        _renderEmpty() {
            document.getElementById('vlog-master-loader').innerHTML = `<h3>CAMPUS VAZIO</h3>`;
        }
    };

    // Tenta auto-inicializar se estiver em ambiente isolado
    if(window.vlogApi) VlogFeedView.init();
</script>
