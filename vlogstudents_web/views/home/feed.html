<!-- 
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - SUPREME FEED ENGINE v220.0.0
 * FULL TIKTOK CLONE | DUAL-LAYOUT RESPONSIVE | NEON DB DATA BINDING
 * 
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 * 
 * Engenharia de Fluxo:
 * - Ultra-Stable Data Fetch: Tratamento de exceções e loaders de alta fidelidade.
 * - Dynamic Viewport Guard: Re-layout instantâneo ao redimensionar a janela.
 * - TikTok Design Language: Sombras graduais, pílulas translúcidas e neon master.
 * - 3-Column Desktop: Sidebar (L) + Immersive Player (C) + Interaction Hub (R).
 * - Immersive Mobile: Vídeo absoluto (Cover) com Action Column flutuante.
 * - Video Lifecycle Kernel: Auto-play, Auto-pause e Volume Global Sync.
 * ============================================================================
-->

<div id="feed-root" class="vh-100 vw-100 bg-black overflow-hidden position-relative">

    <!-- 1. SIDEBAR ESQUERDA (APENAS DESKTOP - DESIGN TIKTOK) -->
    <aside class="desktop-sidebar d-none d-lg-flex flex-column position-fixed h-100 py-4 px-3 border-end-glass">
        <div class="brand-container mb-5 px-3">
            <img src="/assets/images/logo.png" alt="VlogStudents" width="160" class="pulse-neon clickable" onclick="location.reload()">
        </div>
        
        <nav class="sidebar-nav flex-grow-1">
            <a href="#/home/feed" class="sidebar-link active">
                <i class="fas fa-home-alt"></i> <span>Para ti</span>
            </a>
            <a href="#/search/search-people" class="sidebar-link">
                <i class="fas fa-compass"></i> <span>Explorar</span>
            </a>
            <a href="#/chat/chat-list" class="sidebar-link">
                <i class="fas fa-comment-alt-lines"></i> <span>Mensagens</span>
            </a>
            <a href="#/profile/view-profile" class="sidebar-link">
                <i class="fas fa-user-circle"></i> <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer px-3">
            <div class="d-flex flex-wrap gap-2 text-muted text-xs fw-bold mb-3">
                <span>Sobre</span><span>Privacidade</span><span>Termos</span>
            </div>
            <p class="text-neon fw-black text-xs">© 2026 VLOGSTUDENTS ENTERPRISE</p>
        </div>
    </aside>

    <!-- 2. FEED VIEWPORT (SCROLL PRINCIPAL) -->
    <div id="feed-container" class="h-100 overflow-y-scroll snap-y-mandatory no-scrollbar">
        <!-- LOADER INICIAL -->
        <div id="feed-loading-overlay" class="h-100 w-100 d-flex flex-column align-items-center justify-content-center bg-black" style="z-index: 200;">
            <div class="loader-neon-circle mb-4"></div>
            <h6 class="text-neon fw-black ls-vwide animate__animated animate__pulse animate__infinite">MINERANDO REELS...</h6>
        </div>
    </div>

    <!-- 3. TEMPLATE MESTRE (O DNA DO CONTEÚDO) -->
    <template id="reel-structure-template">
        <div class="reel-item h-100 w-100 snap-start d-flex justify-content-center" data-id="{{id}}">
            
            <!-- MOBILE DESIGN (IMAGE 1 FIDELITY) -->
            <div class="layout-mobile d-lg-none w-100 h-100 position-relative">
                <video id="vid-m-{{id}}" class="vlog-player-node w-100 h-100 object-fit-cover" loop playsinline preload="auto">
                    <source src="{{video_url}}" type="video/mp4">
                </video>
                
                <div class="vignette-bottom"></div>

                <!-- Action Column -->
                <div class="mobile-side-actions position-absolute d-flex flex-column gap-4">
                    <div class="avatar-stack">
                        <img src="{{author_img}}" class="rounded-circle border-neon-thin shadow-neon" width="50" height="50" onclick="location.hash='#/profile/view-profile?id={{author_id}}'">
                        <div class="follow-badge {{follow_class}}">+</div>
                    </div>
                    <div class="action-node" onclick="VlogFeedView.like({{id}})">
                        <div class="icon-circle {{liked_class}}"><i class="fas fa-heart"></i></div>
                        <span class="fw-black text-white text-xs">{{likes}}</span>
                    </div>
                    <div class="action-node" onclick="VlogFeedView.openComments({{id}})">
                        <div class="icon-circle"><i class="fas fa-comment-dots"></i></div>
                        <span class="fw-black text-white text-xs">{{comments}}</span>
                    </div>
                    <div class="action-node">
                        <div class="icon-circle"><i class="fas fa-share"></i></div>
                        <span class="fw-black text-white text-xs">Share</span>
                    </div>
                </div>

                <!-- Info Overlay -->
                <div class="mobile-meta position-absolute p-4 w-75">
                    <h5 class="fw-black text-white mb-1">@{{author_handle}}</h5>
                    <p class="text-white text-small fw-medium mb-3">{{title}}</p>
                    <div class="uni-badge-pill">
                        <i class="fas fa-school me-2"></i><span>{{university}}</span>
                    </div>
                </div>
            </div>

            <!-- DESKTOP DESIGN (IMAGE 2 FIDELITY) -->
            <div class="layout-desktop d-none d-lg-flex w-100 h-100 align-items-center justify-content-center" style="margin-left: 280px;">
                <div class="desktop-split-card glass-morphism rounded-xl d-flex overflow-hidden animate__animated animate__zoomIn">
                    
                    <!-- Player Center -->
                    <div class="player-center position-relative bg-dark d-flex align-items-center justify-content-center" style="flex: 1.5;">
                        <video id="vid-d-{{id}}" class="vlog-player-node h-100 w-100 object-fit-contain" loop playsinline>
                            <source src="{{video_url}}" type="video/mp4">
                        </video>
                        <div class="desktop-mute-btn position-absolute bottom-0 end-0 p-4">
                            <button class="btn-vlog-circle-sm glass-morphism" onclick="VlogFeedView.muteAll()">
                                <i class="fas fa-volume-up mute-icon"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Interaction Right -->
                    <div class="interaction-sidebar d-flex flex-column bg-surface-dark border-start-glass" style="width: 450px;">
                        <div class="p-4 border-bottom-glass">
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="d-flex align-items-center gap-3">
                                    <img src="{{author_img}}" class="rounded-circle border-neon-thin" width="48" height="48">
                                    <div>
                                        <h6 class="mb-0 fw-black text-white">@{{author_handle}}</h6>
                                        <p class="text-muted text-xs fw-bold mb-0">{{university}}</p>
                                    </div>
                                </div>
                                <button class="btn-vlog-primary btn-vlog-pill px-4">Seguir</button>
                            </div>
                            <h6 class="text-white fw-bold mb-4">{{title}}</h6>
                            <div class="d-flex gap-4">
                                <div class="interaction-stat"><i class="fas fa-heart me-2 {{liked_class}}"></i><span>{{likes}}</span></div>
                                <div class="interaction-stat"><i class="fas fa-comment-dots me-2"></i><span>{{comments}}</span></div>
                            </div>
                        </div>

                        <!-- Real-time Discussion Area -->
                        <div class="discussion-area flex-grow-1 overflow-y-auto p-4 no-scrollbar">
                            <div id="comments-box-{{id}}" class="d-flex flex-column gap-4">
                                <!-- Injetado via JS -->
                            </div>
                        </div>

                        <!-- Sticky Comment Input -->
                        <div class="p-4 border-top-glass">
                            <div class="input-pill-dark d-flex align-items-center gap-3 px-3 py-2">
                                <input type="text" class="flex-grow-1 bg-transparent border-0 text-white text-small" placeholder="Adicionar Voice...">
                                <button class="text-neon fw-black text-xs ls-wide">PUBLICAR</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </template>

    <!-- 4. MOBILE COMMENTS SHEET -->
    <div id="mobile-comments-modal" class="vlog-bottom-sheet d-none">
        <div class="modal-handle"></div>
        <div id="mobile-comments-container"></div>
    </div>

</div>

<!-- CSS NUCLEAR (TIKTOK FIDELITY) -->
<style>
    #feed-container {
        scroll-snap-type: y mandatory;
        height: 100vh; width: 100vw;
    }
    .reel-item { scroll-snap-align: start; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* DESKTOP SIDEBAR */
    .desktop-sidebar {
        width: 280px; background: #000; z-index: 1000;
    }
    .sidebar-link {
        display: flex; align-items: center; gap: 15px; padding: 12px 16px;
        border-radius: 12px; color: white; font-weight: 800; font-size: 18px;
        margin-bottom: 10px; transition: all 0.2s ease;
    }
    .sidebar-link:hover { background: rgba(255, 255, 255, 0.08); }
    .sidebar-link.active { color: var(--primary-neon); }
    .sidebar-link i { font-size: 24px; width: 30px; text-align: center; }

    /* ACTION NODES (MOBILE) */
    .mobile-side-actions { right: 15px; bottom: 120px; z-index: 50; }
    .icon-circle {
        width: 50px; height: 50px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
        display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .action-node { cursor: pointer; text-align: center; }
    .action-node:active { transform: scale(0.9); }

    /* DESKTOP SPLIT VIEW */
    .desktop-split-card {
        width: 100%; max-width: 1100px; height: 85vh;
        background: #121212; border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }
    .border-start-glass { border-left: 1px solid rgba(255, 255, 255, 0.05); }
    .input-pill-dark { background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }
    .interaction-stat { font-weight: 900; font-size: 14px; color: white; display: flex; align-items: center; }

    /* UTILS */
    .vignette-bottom {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
        background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
        pointer-events: none;
    }
    .loader-neon-circle {
        width: 60px; height: 60px; border: 4px solid rgba(204, 255, 0, 0.1);
        border-top-color: var(--primary-neon); border-radius: 50%;
        animation: spin 1s infinite linear;
    }
    .uni-badge-pill {
        background: rgba(204, 255, 0, 0.15); border: 1px solid var(--primary-neon);
        padding: 6px 14px; border-radius: 6px; color: var(--primary-neon);
        font-weight: 900; font-size: 10px; display: inline-flex;
    }
    .text-error { color: #FF3B30 !important; }
</style>

<!-- JS KERNEL: MOTOR DE DADOS E VISUALIZAÇÃO -->
<script>
    const VlogFeedView = {
        _reels: [],
        _activeObserver: null,
        _muted: false,

        async init() {
            console.log("%c[FEED_KERNEL] Iniciando Sincronia v220.0.0", "color: #CCFF00; font-weight: bold;");
            
            try {
                // 1. Fetch Real do Neon DB
                const response = await window.vlogApi.reels.getFeed(1);
                
                if (response.success && response.data.length > 0) {
                    this._reels = response.data;
                    this._renderFeedStream();
                } else {
                    this._renderEmptyState();
                }
            } catch (err) {
                console.error("[FEED_FATAL]", err);
                this._renderErrorState();
            } finally {
                document.getElementById('feed-loading-overlay').style.display = 'none';
            }
        },

        _renderFeedStream() {
            const viewport = document.getElementById('feed-scroll-viewport');
            const template = document.getElementById('reel-structure-template').innerHTML;

            viewport.innerHTML = this._reels.map(reel => {
                let html = template;
                
                // Mapeamento Blindado de Variáveis
                const map = {
                    '{{id}}': reel.id,
                    '{{video_url}}': window.vlogMedia.resolveUrl(reel.drive_file_id),
                    '{{author_img}}': window.vlogMedia.resolveUrl(reel.author_picture),
                    '{{author_handle}}': reel.author_name.replace(/\s/g, '').toLowerCase(),
                    '{{author_id}}': reel.author_id,
                    '{{title}}': reel.title,
                    '{{university}}': reel.author_university || 'CAMPUS VLOG',
                    '{{likes}}': window.VlogFormat.compact(reel.likes_count),
                    '{{comments}}': window.VlogFormat.compact(reel.comments_count),
                    '{{liked_class}}': reel.is_liked ? 'text-error' : '',
                    '{{follow_class}}': reel.is_followed ? 'd-none' : ''
                };

                Object.keys(map).forEach(key => {
                    html = html.split(key).join(map[key]);
                });
                return html;
            }).join('');

            this._setupVideoIntersection();
        },

        _setupVideoIntersection() {
            const options = { threshold: 0.7 };
            this._activeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const id = video.id.split('-').pop();

                    if (entry.isIntersecting) {
                        video.play().catch(() => console.warn("Autoplay block."));
                        window.vlogApi.reels.trackView(id); // Telemetria real

                        // Se Desktop, carrega discussões laterais
                        if (window.innerWidth >= 1024) this._loadComments(id);
                    } else {
                        video.pause();
                    }
                });
            }, options);

            document.querySelectorAll('.vlog-player-node').forEach(v => this._activeObserver.observe(v));
        },

        async _loadComments(reelId) {
            const container = document.getElementById(`comments-box-${reelId}`);
            if (!container) return;

            try {
                const res = await window.vlogApi.social.getComments(reelId);
                if (res.success) {
                    container.innerHTML = res.data.map(c => `
                        <div class="d-flex gap-3 animate__animated animate__fadeIn">
                            <img src="${window.vlogMedia.resolveUrl(c.user_avatar)}" class="rounded-circle" width="40" height="40">
                            <div>
                                <p class="mb-1 text-white fw-black text-xs">@${c.user_name}</p>
                                <p class="mb-1 text-white opacity-80 text-small">${c.content}</p>
                                <small class="opacity-30 fw-bold" style="font-size: 9px;">${window.VlogFormat.relativeTime(c.created_at)}</small>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        },

        like(id) {
            window.vlogApi.social.toggleLike(id).then(res => {
                document.querySelectorAll(`[data-id="${id}"] .fa-heart`).forEach(icon => {
                    icon.classList.toggle('text-error', res.isLiked);
                });
                if ("vibrate" in navigator) navigator.vibrate(40);
            });
        },

        muteAll() {
            this._muted = !this._muted;
            document.querySelectorAll('video').forEach(v => v.muted = this._muted);
            document.querySelectorAll('.mute-icon').forEach(i => {
                i.className = this._muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            });
        },

        _renderErrorState() {
            document.getElementById('feed-scroll-viewport').innerHTML = `
                <div class="h-100 d-flex flex-column align-items-center justify-content-center p-5 text-center">
                    <i class="fas fa-wifi-slash text-error fa-4x mb-4"></i>
                    <h3 class="fw-black text-white">CONEXÃO PERDIDA</h3>
                    <p class="text-muted">Não conseguimos minerar o banco de dados Neon.</p>
                    <button class="btn-vlog-primary mt-4" onclick="location.reload()">TENTAR NOVAMENTE</button>
                </div>
            `;
        }
    };

    VlogFeedView.init();
</script>
