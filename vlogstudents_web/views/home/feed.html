<!-- 
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - SUPREME FEED ENGINE v300.0.0
 * FULL RESPONSIVE TIKTOK ARCHITECTURE | ZERO LAYOUT ERROR | NEON DB INTEGRITY
 * 
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 * 
 * Engenharia de Interface e Performance:
 * - Triple-Column Matrix (Desktop): Sidebar fixa, Player centralizado, Social Hub lateral.
 * - Mobile Immersive Kernel: Vídeo em tela cheia com Action Column flutuante.
 * - Hardware Accelerated Media: Transições a 60fps usando transform3d e GPU.
 * - Dynamic Viewport Guard: Redimensionamento inteligente sem quebra de pixels.
 * - Infinite Snap-Scroll: Sistema de "trava" vertical idêntico ao app nativo.
 * - Auto-Sincronia Social: Likes, Comentários e Follows reais via Neon DB.
 * ============================================================================
-->

<div id="vlog-feed-orchestrator" class="vh-100 vw-100 bg-black overflow-hidden position-relative">

    <!-- 1. CAMADA DE FUNDO ATMOSFÉRICA (DENTRO DO CONTEXTO CHAPA) -->
    <div class="feed-ambient-glow"></div>

    <!-- 2. SIDEBAR ESQUERDA (ESTILO TIKTOK DESKTOP - FIXA) -->
    <aside id="main-sidebar" class="d-none d-lg-flex flex-column position-fixed h-100 py-4 px-3 border-end-glass">
        <div class="brand-zone mb-5 px-3">
            <img src="/assets/images/logo.png" alt="VlogStudents" width="160" class="pulse-neon clickable" onclick="location.reload()">
        </div>
        
        <nav class="sidebar-navigation flex-grow-1">
            <a href="#/home/feed" class="sidebar-item active">
                <div class="icon-box"><i class="fas fa-home-lg-alt"></i></div>
                <span>Para ti</span>
            </a>
            <a href="#/search/search-people" class="sidebar-item">
                <div class="icon-box"><i class="fas fa-compass"></i></div>
                <span>Explorar</span>
            </a>
            <a href="#/chat/chat-list" class="sidebar-item">
                <div class="icon-box"><i class="fas fa-comment-alt-lines"></i></div>
                <span>Mensagens</span>
            </a>
            <a href="#/profile/view-profile" class="sidebar-item">
                <div class="icon-box"><i class="fas fa-user-circle"></i></div>
                <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-legal px-3">
            <div class="d-flex flex-wrap gap-2 text-muted text-xs fw-bold mb-3">
                <span class="hover-neon clickable">Sobre</span>
                <span class="hover-neon clickable">Privacidade</span>
                <span class="hover-neon clickable">Termos</span>
            </div>
            <p class="text-neon fw-black text-xs m-0">© 2026 VLOGSTUDENTS ENTERPRISE</p>
        </div>
    </aside>

    <!-- 3. VIEWPORT DE SCROLL (O CORE DO FEED) -->
    <div id="feed-main-viewport" class="h-100 overflow-y-scroll snap-y-mandatory no-scrollbar">
        <!-- LOADER DE MINERAÇÃO (DESIGN INDUSTRIAL) -->
        <div id="feed-global-loader" class="vh-100 vw-100 d-flex flex-column align-items-center justify-content-center bg-black position-absolute top-0 start-0" style="z-index: 500;">
            <div class="loader-neon-ring mb-4"></div>
            <h5 class="text-neon fw-black ls-vwide animate__animated animate__pulse animate__infinite">MINERANDO CAMPUS...</h5>
        </div>
    </div>

    <!-- 4. TEMPLATE ATÔMICO DE REEL (RESPONSIVO TOTAL) -->
    <template id="reel-master-template">
        <div class="reel-item-container h-100 w-100 snap-start d-flex justify-content-center" data-id="{{id}}">
            
            <!-- DESIGN MOBILE (IMAGE 1 FIDELITY) -->
            <div class="layout-mobile d-lg-none w-100 h-100 position-relative">
                <div class="video-hardware-box h-100 w-100">
                    <video id="vid-m-{{id}}" class="vlog-media-node w-100 h-100 object-fit-cover" loop playsinline preload="auto">
                        <source src="{{video_url}}" type="video/mp4">
                    </video>
                </div>
                
                <div class="mobile-vignette-overlay"></div>

                <!-- Coluna de Ações Flutuante (Estilo Chapa) -->
                <div class="mobile-actions-panel position-absolute d-flex flex-column gap-4">
                    <div class="author-stack">
                        <div class="avatar-ring-neon">
                            <img src="{{author_img}}" class="rounded-circle" width="50" height="50" onclick="location.hash='#/profile/view-profile?id={{author_id}}'">
                        </div>
                        <div class="follow-badge-plus {{follow_hidden}}">+</div>
                    </div>
                    
                    <div class="action-node" onclick="VlogFeedView.handleLike({{id}})">
                        <div class="action-icon-circle {{liked_class}}" id="m-like-{{id}}">
                            <i class="fas fa-heart"></i>
                        </div>
                        <span class="action-label">{{likes}}</span>
                    </div>

                    <div class="action-node" onclick="VlogFeedView.openMobileComments({{id}})">
                        <div class="action-icon-circle">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <span class="action-label">{{comments}}</span>
                    </div>

                    <div class="action-node" onclick="VlogFeedView.handleShare({{id}})">
                        <div class="action-icon-circle">
                            <i class="fas fa-share"></i>
                        </div>
                        <span class="action-label">Voices</span>
                    </div>
                </div>

                <!-- Metadados no Rodapé -->
                <div class="mobile-meta-overlay position-absolute p-4 w-100">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <h5 class="fw-black text-white m-0">@{{author_handle}}</h5>
                        <i class="fas fa-check-circle text-cyan" style="font-size: 12px;"></i>
                    </div>
                    <p class="text-white text-small fw-medium mb-3 title-truncate">{{title}}</p>
                    <div class="university-badge">
                        <i class="fas fa-school me-2 text-neon"></i>
                        <span class="fw-black">{{university}}</span>
                    </div>
                </div>
            </div>

            <!-- DESIGN DESKTOP (IMAGE 2 FIDELITY - TIKTOK SPLIT) -->
            <div class="layout-desktop d-none d-lg-flex w-100 h-100 align-items-center justify-content-center" style="padding-left: 280px;">
                <div class="desktop-master-card glass-morphism rounded-xl d-flex overflow-hidden">
                    
                    <!-- Coluna Central: Player Imersivo -->
                    <div class="player-column position-relative bg-black d-flex align-items-center justify-content-center">
                        <video id="vid-d-{{id}}" class="vlog-media-node h-100 w-100 object-fit-contain" loop playsinline>
                            <source src="{{video_url}}" type="video/mp4">
                        </video>
                        
                        <!-- Controles Estampados -->
                        <div class="player-stamped-controls position-absolute bottom-0 w-100 p-4 d-flex justify-content-between align-items-center">
                            <button class="btn-control-glass" onclick="VlogFeedView.toggleMute()">
                                <i class="fas fa-volume-up mute-trigger"></i>
                            </button>
                            <div class="progress-container-chapa flex-grow-1 mx-4">
                                <div class="progress-rail rounded-pill">
                                    <div id="bar-{{id}}" class="progress-track bg-neon rounded-pill" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Coluna Direita: Interação Social (High-Contrast) -->
                    <aside class="interaction-column d-flex flex-column bg-surface-dark border-start-glass">
                        
                        <!-- Header do Autor -->
                        <div class="interaction-header p-4 border-bottom-glass">
                            <div class="d-flex align-items-center justify-content-between mb-4">
                                <div class="d-flex align-items-center gap-3 clickable" onclick="location.hash='#/profile/view-profile?id={{author_id}}'">
                                    <img src="{{author_img}}" class="rounded-circle border-neon-thin" width="50" height="50">
                                    <div>
                                        <h6 class="mb-0 fw-black text-white">@{{author_handle}}</h6>
                                        <p class="text-muted text-xs fw-bold mb-0 text-uppercase">{{university}}</p>
                                    </div>
                                </div>
                                <button class="btn-vlog-primary btn-vlog-pill px-4 py-2" onclick="VlogFeedView.toggleFollow({{author_id}})">SEGUIR</button>
                            </div>
                            <h6 class="text-white fw-medium mb-4 lh-base">{{title}}</h6>
                            <div class="d-flex gap-5">
                                <div class="stat-unit clickable" onclick="VlogFeedView.handleLike({{id}})">
                                    <div class="stat-icon-box {{liked_class}}"><i class="fas fa-heart"></i></div>
                                    <span class="fw-black text-small text-white ms-2">{{likes}}</span>
                                </div>
                                <div class="stat-unit">
                                    <div class="stat-icon-box"><i class="fas fa-comment-dots"></i></div>
                                    <span class="fw-black text-small text-white ms-2">{{comments}}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Lista de Comentários (Scroll Independente) -->
                        <div class="comments-engine-area flex-grow-1 overflow-y-auto p-4 no-scrollbar">
                            <div id="desktop-comments-{{id}}" class="d-flex flex-column gap-4">
                                <!-- Threads reais carregadas pelo Módulo -->
                            </div>
                        </div>

                        <!-- Barra de Input Estampada -->
                        <div class="interaction-footer p-4 border-top-glass">
                            <div class="input-pill-chapa d-flex align-items-center gap-3 px-3 py-2">
                                <input type="text" id="input-d-{{id}}" class="flex-grow-1 bg-transparent border-0 text-white text-small" placeholder="Adicionar Voice...">
                                <button class="text-neon fw-black text-xs ls-wide hover-scale" onclick="VlogFeedView.submitComment({{id}})">PUBLICAR</button>
                            </div>
                        </div>
                    </aside>

                </div>
            </div>

        </div>
    </template>

    <!-- 5. LIQUID GLASS BOTTOM BAR (APENAS MOBILE - REQUISITO DE PERFEIÇÃO) -->
    <div class="d-lg-none liquid-nav-container">
        <nav class="liquid-nav-bar glass-morphism">
            <a href="#/home/feed" class="nav-item active"><i class="fas fa-home"></i><span>FEED</span></a>
            <a href="#/chat/chat-list" class="nav-item"><i class="fas fa-comment"></i><span>CHAT</span></a>
            <div class="nav-central-action" onclick="location.hash='#/status/create-status'"><div class="btn-vlog-primary rounded-circle"><i class="fas fa-plus"></i></div></div>
            <a href="#/points/dashboard" class="nav-item"><i class="fas fa-coins"></i><span>POINTS</span></a>
            <a href="#/profile/view-profile" class="nav-item"><i class="fas fa-user"></i><span>PERFIL</span></a>
        </nav>
    </div>

</div>

<!-- CSS NUCLEAR: RECONSTRUÇÃO DE LAYOUT E FIDELIDADE -->
<style>
    /* ORQUESTRAÇÃO DE LAYOUT */
    #vlog-feed-orchestrator { background: #000; color: #fff; font-family: var(--font-main); }
    
    .feed-ambient-glow {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle at 20% 30%, rgba(204, 255, 0, 0.03) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.03) 0%, transparent 50%);
        pointer-events: none; z-index: 1;
    }

    /* SIDEBAR ELITE (DESKTOP) */
    .desktop-sidebar {
        width: 280px; z-index: 1000; background: #000;
        transition: transform 0.3s ease;
    }
    .sidebar-item {
        display: flex; align-items: center; gap: 20px; padding: 14px 20px;
        border-radius: 12px; color: #fff; font-weight: 800; font-size: 19px;
        margin-bottom: 8px; transition: all 0.2s var(--ease-out-expo);
    }
    .sidebar-item:hover { background: rgba(255, 255, 255, 0.08); color: var(--primary-neon); }
    .sidebar-item.active { color: var(--primary-neon); }
    .sidebar-item .icon-box { width: 32px; text-align: center; font-size: 26px; }

    /* VIEWPORT SNAPPING */
    #feed-main-viewport {
        scroll-snap-type: y mandatory;
        height: 100vh; width: 100vw;
        position: relative; z-index: 10;
    }
    .reel-item-container { scroll-snap-align: start; }

    /* ACTION COLUMN (MOBILE) */
    .mobile-actions-panel { right: 15px; bottom: 130px; z-index: 100; align-items: center; }
    .action-icon-circle {
        width: 52px; height: 52px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s ease;
    }
    .action-icon-circle:active { transform: scale(0.85); }
    .action-label { font-size: 11px; font-weight: 900; margin-top: 6px; text-shadow: 0 2px 4px #000; }
    
    .author-stack { position: relative; margin-bottom: 12px; }
    .avatar-ring-neon {
        padding: 3px; border-radius: 50%; border: 2px solid var(--primary-neon);
        box-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
    }
    .follow-badge-plus {
        position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
        background: var(--primary-neon); color: #000; width: 22px; height: 22px;
        border-radius: 50%; font-weight: 900; font-size: 16px;
        display: flex; align-items: center; justify-content: center; border: 2px solid #000;
    }

    /* DESKTOP MASTER CARD */
    .desktop-master-card {
        width: 100%; max-width: 1150px; height: 88vh;
        background: #111; border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 50px 100px rgba(0,0,0,0.9);
    }
    .interaction-column { width: 450px; }
    .stat-icon-box {
        width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .input-pill-chapa {
        background: rgba(255, 255, 255, 0.05); border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* LOADING & UTILS */
    .loader-neon-ring {
        width: 70px; height: 70px; border: 5px solid rgba(204, 255, 0, 0.1);
        border-top-color: var(--primary-neon); border-radius: 50%;
        animation: spin 0.8s infinite linear;
    }
    .university-badge {
        background: rgba(204, 255, 0, 0.12); border: 1px solid var(--primary-neon);
        padding: 7px 15px; border-radius: 8px; color: var(--primary-neon);
        font-size: 10px; display: inline-flex; align-items: center;
    }
    .mobile-vignette-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.5) 100%);
        pointer-events: none;
    }
</style>

<!-- JS KERNEL: ORQUESTRADOR DE VLOGS v300 -->
<script>
    const VlogFeedView = {
        _reels: [],
        _observer: null,
        _activeVideo: null,
        _isMuted: false,

        /**
         * BOOTSTRAP: Conexão direta com Neon DB e Render Pipeline
         */
        async init() {
            console.log("%c[FEED_KERNEL] Sincronizando Malha de Vlogs v300.0.0", "color: #CCFF00; font-weight: bold;");
            
            try {
                // 1. Fetch de Dados Reais via Kernels Core
                const response = await window.vlogApi.reels.getFeed(1);
                
                if (response.success && response.data.length > 0) {
                    this._reels = response.data;
                    this._renderMasterStream();
                } else {
                    this._renderEmptyState();
                }
            } catch (err) {
                console.error("[FEED_FATAL_FAILURE]", err);
                this._renderErrorState();
            } finally {
                const loader = document.getElementById('feed-global-loader');
                if (loader) loader.classList.add('animate__fadeOut');
                setTimeout(() => loader ? loader.remove() : null, 800);
            }
        },

        _renderMasterStream() {
            const viewport = document.getElementById('feed-main-viewport');
            const template = document.getElementById('reel-master-template').innerHTML;

            viewport.innerHTML = this._reels.map(reel => {
                let html = template;
                
                // Mapeamento Blindado de Design Tokens e Dados do Banco
                const dataMap = {
                    '{{id}}': reel.id,
                    '{{video_url}}': window.vlogMedia.resolveUrl(reel.drive_file_id),
                    '{{author_img}}': window.vlogMedia.resolveUrl(reel.author_picture),
                    '{{author_handle}}': reel.author_name.replace(/\s/g, '').toLowerCase(),
                    '{{author_id}}': reel.author_id,
                    '{{title}}': reel.title,
                    '{{university}}': reel.author_university || 'CAMPUS DIGITAL',
                    '{{likes}}': window.VlogFormat.compact(reel.likes_count),
                    '{{comments}}': window.VlogFormat.compact(reel.comments_count),
                    '{{liked_class}}': reel.is_liked ? 'text-error animate__animated animate__heartBeat' : '',
                    '{{follow_hidden}}': reel.is_followed ? 'd-none' : ''
                };

                Object.keys(dataMap).forEach(key => {
                    html = html.split(key).join(dataMap[key]);
                });
                return html;
            }).join('');

            this._initializeAutoplayKernel();
        },

        /**
         * AUTOPLAY KERNEL: Intersection Observer (60% Visibility Trigger)
         */
        _initializeAutoplayKernel() {
            const options = { threshold: 0.6 };
            
            this._observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    const id = video.id.split('-').pop();

                    if (entry.isIntersecting) {
                        // Pausa o anterior antes de iniciar o novo
                        if (this._activeVideo && this._activeVideo !== video) {
                            this._activeVideo.pause();
                        }
                        
                        video.play().catch(e => console.warn("[MEDIA] Bloqueio de Autoplay do Navegador."));
                        this._activeVideo = video;
                        
                        // Telemetria Industrial: Track View no Neon DB
                        window.vlogApi.reels.trackView(id);

                        // No Desktop, carrega as discussões em paralelo
                        if (window.innerWidth >= 1024) this._loadSocialThread(id);
                    } else {
                        video.pause();
                    }
                });
            }, options);

            document.querySelectorAll('.vlog-media-node').forEach(v => this._observer.observe(v));
        },

        async _loadSocialThread(reelId) {
            const container = document.getElementById(`desktop-comments-${reelId}`);
            if (!container) return;

            try {
                const res = await window.vlogApi.social.getComments(reelId);
                if (res.success && res.data.length > 0) {
                    container.innerHTML = res.data.map(c => `
                        <div class="d-flex gap-3 animate__animated animate__fadeInUp">
                            <img src="${window.vlogMedia.resolveUrl(c.user_avatar)}" class="rounded-circle border-neon-thin" width="38" height="38">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center gap-2">
                                    <span class="text-white fw-black text-xs">@${c.user_name}</span>
                                    <span class="text-muted" style="font-size: 8px;">• ${window.VlogFormat.relativeTime(c.created_at)}</span>
                                </div>
                                <p class="text-white opacity-80 text-small mb-0" style="line-height: 1.4;">${c.content}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<div class="text-center p-5 opacity-30 text-xs">A discussão ainda não começou.</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="text-center text-error text-xs">Falha ao minerar discussões.</div>`;
            }
        },

        /**
         * INTERAÇÕES SOCIAIS OTIMISTAS
         */
        handleLike(id) {
            window.vlogApi.social.toggleLike(id).then(res => {
                const iconGroups = document.querySelectorAll(`[data-id="${id}"] .fa-heart`);
                iconGroups.forEach(icon => {
                    icon.parentElement.classList.toggle('text-error', res.isLiked);
                    if (res.isLiked) icon.parentElement.classList.add('heart-animation');
                });
                if ("vibrate" in navigator) navigator.vibrate(40);
            });
        },

        toggleMute() {
            this._isMuted = !this._isMuted;
            const videos = document.querySelectorAll('video');
            const icons = document.querySelectorAll('.mute-trigger');
            
            videos.forEach(v => v.muted = this._isMuted);
            icons.forEach(i => {
                i.className = this._isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            });
        },

        openMobileComments(id) {
            const overlay = document.getElementById('mobile-comments-overlay');
            overlay.classList.remove('d-none');
            overlay.classList.add('animate__slideInUp');
            // Aqui seria injetado o componente Comments-Sheet via Router
        },

        _renderEmptyState() {
            document.getElementById('feed-main-viewport').innerHTML = `
                <div class="h-100 d-flex flex-column align-items-center justify-content-center text-center p-5">
                    <i class="fas fa-video-slash text-white opacity-10 fa-4x mb-4"></i>
                    <h2 class="fw-black text-white">CAMPUS SILENCIOSO</h2>
                    <p class="text-muted">Seja o primeiro a minerar conteúdo hoje.</p>
                    <button class="btn-vlog-primary mt-4 px-5" onclick="location.hash='#/post/upload'">POSTAR VLOG</button>
                </div>
            `;
        }
    };

    // Inicialização do Motor
    VlogFeedView.init();
</script>
