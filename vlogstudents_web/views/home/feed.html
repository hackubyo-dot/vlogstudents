<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - FEED VIEW v1.0.0
 * THE PREEMINENT REELS EXPERIENCE - HIGH PERFORMANCE MEDIA
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Engenharia de Interface:
 * - Immersive PageView: Scroll vertical infinito com snapping (alinhamento).
 * - Campus Stories Matrix: Integração da barra de status no topo do feed.
 * - Video Control Layer: Controles de hardware (Replay/Forward 10s) via toque.
 * - Action Column Chapa: Botões laterais em vidro com contadores dinâmicos.
 * - Info Overlay: Identidade do autor, botão de subscrição e metadados.
 * - Auto-Pause Engine: Lógica de suspensão de mídia em interações sociais.
 * ============================================================================
-->

<div id="feed-root-container" class="vh-100 vw-100 overflow-hidden bg-black position-relative">

    <!-- 1. CAMPUS STORIES OVERLAY (TOP BAR) -->
    <!-- Visibilidade controlada pelo scroll (desaparece ao subir o vídeo) -->
    <div id="campus-stories-wrapper" class="position-absolute w-100 animate__animated animate__fadeInDown" style="top: 20px; z-index: 100;">
        <div id="campus-status-bar" class="status-row px-4">
            <!-- Injetado dinamicamente por assets/js/modules/status.js -->
        </div>
    </div>

    <!-- 2. REEL STREAM CONTAINER -->
    <!-- Onde o VlogFeedModule injetará os vídeos minerados do Neon DB -->
    <div id="feed-container" class="h-100 w-100 overflow-y-scroll snap-y-mandatory">
        <!-- REELS INJECTED HERE -->
    </div>

    <!-- 3. TEMPLATE MESTRE DE REEL (O MILAGRE VISUAL) -->
    <!-- Este bloco HTML é o "Blueprint" usado para cada vídeo no campus -->
    <template id="reel-template">
        <div class="reel-card h-100 w-100 snap-start position-relative animate-gpu" data-reel-id="{{id}}">

            <!-- PLAYER DE VÍDEO HARDWARE -->
            <div class="video-wrapper h-100 w-100 d-flex align-items-center justify-content-center bg-dark">
                <video
                        id="video-{{id}}"
                        class="vlog-player w-100 h-100 object-fit-cover"
                        loop
                        playsinline
                        poster="{{thumbnail_url}}"
                >
                    <source src="{{video_url}}" type="video/mp4">
                </video>
            </div>

            <!-- CAMADA DE CONTROLES (REVELADA NO CLIQUE) -->
            <div id="controls-{{id}}" class="video-controls-overlay d-none opacity-0 transition-all">
                <div class="d-flex align-items-center justify-content-center gap-5 w-100 h-100">
                    <button class="control-btn hover-scale" onclick="VlogFeed.seek({{id}}, -10)">
                        <i class="fas fa-undo-alt fa-2x"></i>
                        <span class="text-xs fw-black d-block mt-2">10s</span>
                    </button>

                    <button class="play-pause-btn" onclick="VlogFeed.togglePlayback({{id}})">
                        <i class="fas fa-play-circle fa-5x" id="play-icon-{{id}}"></i>
                    </button>

                    <button class="control-btn hover-scale" onclick="VlogFeed.seek({{id}}, 10)">
                        <i class="fas fa-redo-alt fa-2x"></i>
                        <span class="text-xs fw-black d-block mt-2">10s</span>
                    </button>
                </div>
            </div>

            <!-- CAMADA DE PROFUNDIDADE (VIGNETTE GRADIENT) -->
            <div class="video-vignette-immersive"></div>

            <!-- COLUNA DE AÇÕES LATERAIS (IMAGE MATCH 1:1) -->
            <div class="reel-action-column glass-morphism p-2 rounded-pill">
                <div class="d-flex flex-column gap-4 align-items-center py-3">

                    <!-- LIKE ACTION -->
                    <div class="reel-action-btn clickable" onclick="VlogFeed.toggleLike({{id}})">
                        <div class="icon-circle {{liked_class}}" id="like-icon-{{id}}">
                            <i class="fas fa-heart"></i>
                        </div>
                        <span class="count-label" id="like-count-{{id}}">{{likes}}</span>
                    </div>

                    <!-- COMMENT ACTION -->
                    <div class="reel-action-btn clickable" onclick="VlogFeed.openComments({{id}})">
                        <div class="icon-circle">
                            <i class="fas fa-comment-dots"></i>
                        </div>
                        <span class="count-label">{{comments}}</span>
                    </div>

                    <!-- SAVE ACTION (MY LIST) -->
                    <div class="reel-action-btn clickable">
                        <div class="icon-circle">
                            <i class="fas fa-bookmark"></i>
                        </div>
                        <span class="text-xs fw-bold mt-1" style="font-size: 8px;">MY LIST</span>
                    </div>

                    <!-- EPISODES/GRID ACTION -->
                    <div class="reel-action-btn clickable">
                        <div class="icon-circle">
                            <i class="fas fa-th-large"></i>
                        </div>
                        <span class="text-xs fw-bold mt-1" style="font-size: 8px;">VLOGS</span>
                    </div>
                </div>
            </div>

            <!-- OVERLAY DE INFORMAÇÕES (BOTTOM LEFT) -->
            <div class="reel-info-overlay p-4 animate__animated animate__fadeInUp">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="author-avatar-ring">
                        <img src="{{author_picture}}" class="rounded-circle" width="45" height="45" onclick="VlogMain.navigateToProfile({{author_id}})">
                    </div>
                    <div class="author-meta">
                        <div class="d-flex align-items-center gap-2">
                            <h5 class="mb-0 fw-black text-white ls-tight">@{{author_handle}}</h5>
                            <i class="fas fa-check-circle text-cyan verified-xs"></i>
                        </div>
                    </div>
                    <button class="btn-vlog-pill btn-subscribe px-3 py-1 ms-2">Subscribe</button>
                </div>

                <h4 class="text-white fw-light ls-wide mb-2 reel-title">{{title}}</h4>
                <p class="text-secondary text-xs mb-0 reel-description">{{description}}</p>
            </div>

            <!-- ANIMAÇÃO DE CORAÇÃO (DOUBLE TAP) -->
            <div id="heart-burst-{{id}}" class="heart-burst-overlay">
                <i class="fas fa-heart"></i>
            </div>

        </div>
    </template>

    <!-- 4. MODAL DE DISCUSSÕES (BOTTOM SHEET GLASS) -->
    <div id="comments-modal-root" class="vlog-bottom-sheet d-none">
        <!-- O conteúdo é carregado pelo componente de comentários -->
    </div>

</div>

<!-- LÓGICA DE ORQUESTRAÇÃO LOCAL DA VIEW -->
<script>
    const VlogFeedView = {
        _activeVideo: null,

        init() {
            console.log("[VIEW] Feed Imersivo Inicializado.");
            this._setupSnapScroll();
            this._registerVideoEvents();
        },

        _setupSnapScroll() {
            const container = document.getElementById('feed-container');
            container.addEventListener('scroll', () => {
                // Lógica de detecção do vídeo centralizado para play/pause
                this._handleVideoFocus();
            });
        },

        _handleVideoFocus() {
            const reels = document.querySelectorAll('.reel-card');
            let focusedReel = null;

            reels.forEach(reel => {
                const rect = reel.getBoundingClientRect();
                if (rect.top >= 0 && rect.top < window.innerHeight / 2) {
                    focusedReel = reel;
                }
            });

            if (focusedReel) {
                const videoId = `video-${focusedReel.dataset.reelId}`;
                const video = document.getElementById(videoId);

                if (this._activeVideo && this._activeVideo !== video) {
                    this._activeVideo.pause();
                }

                if (video && video.paused) {
                    video.play().catch(() => {});
                    this._activeVideo = video;

                    // Dispara telemetria de visualização via Módulo
                    const id = focusedReel.dataset.reelId;
                    if(window.VlogFeed) window.VlogFeed.trackView(id);
                }
            }
        },

        _registerVideoEvents() {
            // Delegação de eventos para o clique no vídeo (mostrar controles)
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('vlog-player')) {
                    const id = e.target.id.split('-')[1];
                    this.toggleControls(id);
                }
            });

            // Double click para Like (Fidelidade IG/Flutter)
            document.addEventListener('dblclick', (e) => {
                if (e.target.classList.contains('vlog-player')) {
                    const id = e.target.id.split('-')[1];
                    this.triggerDoubleTapLike(id);
                }
            });
        },

        toggleControls(id) {
            const controls = document.getElementById(`controls-${id}`);
            if (controls.classList.contains('d-none')) {
                controls.classList.remove('d-none');
                setTimeout(() => controls.classList.add('opacity-100'), 10);

                // Auto-hide após 3 segundos
                setTimeout(() => {
                    controls.classList.remove('opacity-100');
                    setTimeout(() => controls.classList.add('d-none'), 300);
                }, 3000);
            }
        },

        triggerDoubleTapLike(id) {
            const burst = document.getElementById(`heart-burst-${id}`);
            burst.classList.add('active');

            if (window.VlogFeed) window.VlogFeed.toggleLike(id);

            setTimeout(() => burst.classList.remove('active'), 1000);
            if ("vibrate" in navigator) navigator.vibrate(50);
        }
    };

    VlogFeedView.init();
</script>

<style>
    /* ESTILIZAÇÃO DE ALTA FIDELIDADE (CHAPA DESIGN) */

    #feed-container {
        scroll-snap-type: y mandatory;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none;  /* IE/Edge */
    }
    #feed-container::-webkit-scrollbar { display: none; }

    .reel-card {
        background-color: #000;
        height: 100vh;
        width: 100vw;
    }

    .video-vignette-immersive {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(
            to bottom,
            rgba(0,0,0,0.6) 0%,
            transparent 20%,
            transparent 70%,
            rgba(0,0,0,0.9) 100%
        );
        pointer-events: none;
    }

    /* Coluna de Ações (Image Match) */
    .reel-action-column {
        position: absolute;
        right: 20px;
        bottom: 120px;
        z-index: 10;
        width: 65px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
    }

    .icon-circle {
        width: 45px; height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .reel-action-btn:hover .icon-circle {
        background: rgba(255, 255, 255, 0.15);
        transform: scale(1.1);
    }

    .count-label {
        font-size: 11px;
        font-weight: 900;
        color: white;
        margin-top: 4px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* Info Overlay (Bottom Left) */
    .reel-info-overlay {
        position: absolute;
        bottom: 100px;
        left: 0;
        width: 80%;
        z-index: 10;
        pointer-events: none;
    }
    .reel-info-overlay * { pointer-events: auto; }

    .btn-subscribe {
        background: var(--accent-purple);
        border: none;
        color: white;
        font-weight: 900;
        font-size: 12px;
        box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
    }

    .verified-xs { font-size: 12px; }

    /* Heart Burst Animation */
    .heart-burst-overlay {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 100px;
        color: white;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .heart-burst-overlay.active {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 0.8;
    }

    /* Video Controls */
    .video-controls-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.2);
        z-index: 20;
    }
    .play-pause-btn {
        background: none; border: none; color: white;
        transition: transform 0.2s ease;
    }
    .play-pause-btn:active { transform: scale(0.9); }

    .snap-y-mandatory { scroll-snap-type: y mandatory; }
    .snap-start { scroll-snap-align: start; }
</style>
