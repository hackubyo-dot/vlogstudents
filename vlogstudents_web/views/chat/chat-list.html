<!--
 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - CHAT LIST VIEW v1.0.0
 * HUB DE COMUNICAÇÃO ACADÊMICA & NETWORKING REAL
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 *
 * Engenharia de Interface:
 * - Isolated Header: Botão de pivot para o Feed integrado no cabeçalho.
 * - Discovery Stories: Integração com Campus Status (Seguidores Mútuos).
 * - Multi-Category Filter: Chips reativos (All, Favorites, Work, Groups).
 * - Real-Time Badges: Notificações de leitura sincronizadas via Socket.io.
 * - Liquid Glass Hub: Design de pílula flutuante exclusiva para o módulo chat.
 * ============================================================================
-->

<div id="chat-list-view" class="h-100 vw-100 d-flex flex-column animate__animated animate__fadeIn">

    <!-- 1. HEADER PREMIUM (IMAGE MATCH 1:1) -->
    <header class="chat-header p-4 d-flex align-items-center">
        <!-- BOTÃO FEED PIVOT -->
        <button class="btn-vlog-glass rounded-pill py-2 px-3 me-3 d-flex align-items-center gap-2" onclick="window.location.hash = '#/home/feed'">
            <i class="fas fa-grid-2 text-neon"></i>
            <span class="fw-black text-xs">FEED</span>
        </button>

        <h1 class="h2 fw-black mb-0 ls-tight">Chats</h1>

        <div class="ms-auto d-flex gap-2">
            <button class="btn-vlog-circle-sm" onclick="VlogChatList.toggleSearch()">
                <i class="fas fa-search"></i>
            </button>
            <button class="btn-vlog-circle-sm" onclick="window.location.hash = '#/status/create'">
                <i class="fas fa-camera"></i>
            </button>
            <button class="btn-vlog-circle-sm">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </div>
    </header>

    <!-- 2. SEARCH OVERLAY (CONDICIONAL) -->
    <div id="chat-search-bar" class="px-4 mb-3 d-none">
        <div class="position-relative">
            <i class="fas fa-search position-absolute top-50 start-0 translate-middle-y ms-4 text-muted"></i>
            <input type="text" class="vlog-search-input w-100" placeholder="Buscar colega ou grupo acadêmico..." oninput="VlogChatList.filterList(this.value)">
        </div>
    </div>

    <!-- 3. CAMPUS STORIES (DISCOVERY HUB) -->
    <section class="stories-hub-section mb-4">
        <div id="campus-chat-status" class="status-row px-4">
            <!-- Renderizado dinamicamente pelo VlogStatusModule -->
        </div>
    </section>

    <!-- 4. CATEGORY FILTER CHIPS -->
    <nav class="category-filters px-4 mb-4 overflow-x-auto no-scrollbar d-flex gap-3">
        <button class="filter-pill active" data-filter="All">All</button>
        <button class="filter-pill" data-filter="Favorites">Favorites</button>
        <button class="filter-pill" data-filter="Work">Work</button>
        <button class="filter-pill" data-filter="Groups">Groups</button>
    </nav>

    <!-- 5. CONVERSATION STREAM (NEON DB CORE) -->
    <div id="chat-rooms-container" class="flex-grow-1 overflow-y-auto px-1 pb-5 no-scrollbar">
        <!-- SHIMMER LOADERS -->
        <div class="chat-skeleton p-4">
            <div class="shimmer-loader mb-4" style="height: 80px; width: 100%; border-radius: 20px;"></div>
            <div class="shimmer-loader mb-4" style="height: 80px; width: 100%; border-radius: 20px;"></div>
            <div class="shimmer-loader mb-4" style="height: 80px; width: 100%; border-radius: 20px;"></div>
        </div>
    </div>

    <!-- 6. LIQUID GLASS CHAT NAVIGATION (EXCLUSIVE) -->
    <div class="chat-nav-wrapper">
        <div class="liquid-nav-bar glass-morphism">
            <button class="nav-item active">
                <i class="fas fa-comment-alt"></i>
                <div class="active-dot"></div>
            </button>
            <button class="nav-item" onclick="VlogMain._showToast('Chamadas em breve', 'info')">
                <i class="fas fa-phone-alt"></i>
            </button>
            <button class="nav-item" onclick="window.location.hash = '#/search/global'">
                <i class="fas fa-users"></i>
            </button>
            <!-- BOTÃO ADICIONAR (CRIAR GRUPO) -->
            <button class="nav-plus-btn" onclick="VlogChatList.showCreateGroup()">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </div>

</div>

<!-- TEMPLATE: CHAT TILE (BLUEPRINT) -->
<template id="chat-tile-template">
    <div class="chat-tile d-flex align-items-center p-4 clickable animate__animated animate__fadeInUp" onclick="VlogChatList.openRoom('{{id}}')">
        <div class="position-relative">
            <img src="{{avatar}}" class="vlog-avatar-lg rounded-circle border-neon-thin">
            <div class="online-status {{online_class}}"></div>
        </div>
        <div class="ms-4 flex-grow-1 overflow-hidden">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h6 class="mb-0 fw-black text-white ls-tight">{{name}}</h6>
                <span class="text-muted text-xs fw-bold">{{time}}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <p class="mb-0 text-small text-truncate text-secondary">{{last_message}}</p>
                <div class="unread-count-badge {{badge_class}}">{{unread}}</div>
            </div>
        </div>
    </div>
</template>

<script>
    const VlogChatList = {
        _isSearchOpen: false,

        init() {
            console.log("[VIEW] Chat Hub Online.");
            this._setupFilters();
            this._loadData();

            if(window.VlogTelemetry) window.VlogTelemetry.addBreadcrumb('ui', 'Chat List View Active');
        },

        async _loadData() {
            try {
                // Sincroniza com o Módulo de Chat para buscar salas reais do Neon DB
                await window.VlogChat.fetchRooms();
                // Sincroniza Status (Stories)
                if(window.VlogStatus) window.VlogStatus.fetchStatuses();
            } catch (e) {
                console.error("[CHAT_LIST_ERR]", e);
            }
        },

        _setupFilters() {
            const pills = document.querySelectorAll('.filter-pill');
            pills.forEach(pill => {
                pill.addEventListener('click', (e) => {
                    pills.forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    this.applyFilter(pill.dataset.filter);
                    if("vibrate" in navigator) navigator.vibrate(10);
                });
            });
        },

        toggleSearch() {
            this._isSearchOpen = !this._isSearchOpen;
            const bar = document.getElementById('chat-search-bar');
            bar.classList.toggle('d-none');
            if (this._isSearchOpen) bar.querySelector('input').focus();
        },

        openRoom(id) {
            window.location.hash = `#/chat/room?id=${id}`;
        },

        showCreateGroup() {
            // Implementação de Modal Premium para Grupos Acadêmicos
            window.VlogMain._showToast("Inicializando Kernel de Grupos...", "success");
        }
    };

    VlogChatList.init();
</script>

<style>
    /* CSS EXCLUSIVO DA CHAT LIST (FIDELITY KERNEL) */
    .chat-header {
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .btn-vlog-circle-sm {
        width: 42px; height: 42px;
        background: rgba(255,255,255,0.08);
        border: 1px solid var(--glass-border);
        border-radius: 50%;
        color: white;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.3s ease;
    }

    .btn-vlog-circle-sm:hover {
        background: rgba(255,255,255,0.15);
        transform: scale(1.1);
    }

    .filter-pill {
        white-space: nowrap;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: rgba(255, 255, 255, 0.6);
        padding: 12px 28px;
        border-radius: 30px;
        font-weight: 900;
        font-size: 14px;
        transition: all 0.4s var(--ease-out-expo);
    }

    .filter-pill.active {
        background: white;
        color: black;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        transform: translateY(-2px);
    }

    .chat-tile {
        border-bottom: 1px solid rgba(255,255,255,0.03);
        transition: background 0.3s ease;
    }

    .chat-tile:active {
        background: rgba(255, 255, 255, 0.05);
    }

    .unread-count-badge {
        background: var(--error-red);
        color: white;
        font-size: 10px;
        font-weight: 900;
        min-width: 20px; height: 20px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        padding: 0 6px;
    }

    .unread-count-badge.d-none { display: none; }

    /* Floating Chat Nav Style */
    .chat-nav-wrapper {
        position: fixed;
        bottom: 30px; left: 20px; right: 20px;
        z-index: 100;
    }

    .nav-plus-btn {
        width: 54px; height: 54px;
        background: white;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: black;
        font-size: 24px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .active-dot {
        width: 4px; height: 4px;
        background: var(--primary-neon);
        border-radius: 50%;
        margin-top: 4px;
        box-shadow: 0 0 8px var(--primary-neon);
    }
</style>
