 * ============================================================================
 * VLOGSTUDENTS ENTERPRISE WEB - VOICE CALL VIEW v1.0.0
 * INTERFACE ATMOSFÉRICA PARA COMUNICAÇÃO DE VOZ PURA
 *
 * DESIGNED BY MASTER SOFTWARE ENGINEER - ZERO ERROR POLICY
 * ============================================================================
-->

<div id="voice-call-root" class="fixed-top w-100 h-100 bg-black animate__animated animate__fadeIn" style="z-index: var(--z-overlay);">

    <!-- 1. BACKGROUND BLURRED (AVATAR DO PARTICIPANTE) -->
    <div id="voice-call-bg" class="position-absolute w-100 h-100 opacity-40" style="filter: blur(80px); background-size: cover; background-position: center;"></div>

    <!-- 2. DARK OVERLAY -->
    <div class="position-absolute w-100 h-100 bg-black opacity-60"></div>

    <!-- 3. CONTEÚDO CENTRAL -->
    <div class="position-relative h-100 d-flex flex-column align-items-center justify-content-center py-5">

        <header class="text-center mb-5 animate__animated animate__fadeInDown">
            <div class="badge-vlog badge-neon mb-3">CHAMADA DE VOZ</div>
            <h1 id="voice-participant-name" class="h1 fw-black text-white ls-tight">Estudante</h1>
            <p id="voice-call-status" class="text-neon fw-bold ls-wide mt-2">CONECTANDO...</p>
        </header>

        <!-- AVATAR CENTRAL COM PULSO DE ÁUDIO -->
        <div class="voice-avatar-kernel my-5">
            <div class="audio-waves">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <img id="voice-participant-avatar" src="" class="rounded-circle border-neon-heavy" width="160" height="160">
        </div>

        <div id="voice-timer" class="text-white opacity-50 fw-black font-monospace h4 mt-4">00:00</div>

        <!-- DOCK DE AÇÕES (VOICE VERSION) -->
        <div class="position-absolute bottom-0 w-100 p-5 mb-5">
            <div class="d-flex justify-content-center gap-5">

                <!-- MUTE ACTION -->
                <div class="text-center">
                    <button class="call-action-btn-lg" id="btn-voice-mute" onclick="VlogChat.toggleMic()">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <span class="d-block mt-2 text-xs fw-bold opacity-50">MUDO</span>
                </div>

                <!-- END CALL ACTION -->
                <div class="text-center">
                    <button class="btn-end-call-lg" onclick="VlogChat.terminateActiveCall()">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                    <span class="d-block mt-2 text-xs fw-bold text-error">DESLIGAR</span>
                </div>

                <!-- SPEAKER ACTION -->
                <div class="text-center">
                    <button class="call-action-btn-lg" id="btn-voice-speaker" onclick="VlogChat.toggleSpeaker()">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <span class="d-block mt-2 text-xs fw-bold opacity-50">ALTO-FALANTE</span>
                </div>

            </div>
        </div>

    </div>

</div>

<style>
    .voice-avatar-kernel {
        position: relative;
        display: flex; align-items: center; justify-content: center;
    }

    .border-neon-heavy {
        border: 4px solid var(--primary-neon);
        box-shadow: 0 0 40px rgba(204, 255, 0, 0.3);
    }

    /* Animação de Ondas de Áudio Simuladas */
    .audio-waves {
        position: absolute;
        width: 250px; height: 250px;
        display: flex; align-items: center; justify-content: space-between;
        pointer-events: none;
    }

    .audio-waves span {
        width: 5px; height: 20px;
        background: var(--primary-neon);
        border-radius: 5px;
        opacity: 0.3;
        animation: audio-pulse 1.5s infinite ease-in-out;
    }

    .audio-waves span:nth-child(2) { animation-delay: 0.2s; height: 40px; }
    .audio-waves span:nth-child(3) { animation-delay: 0.4s; height: 60px; }
    .audio-waves span:nth-child(4) { animation-delay: 0.6s; height: 40px; }
    .audio-waves span:nth-child(5) { animation-delay: 0.8s; height: 20px; }

    @keyframes audio-pulse {
        0%, 100% { transform: scaleY(1); opacity: 0.3; }
        50% { transform: scaleY(2); opacity: 0.8; }
    }

    .call-action-btn-lg {
        width: 70px; height: 70px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--glass-border);
        border-radius: 50%;
        color: white;
        font-size: 24px;
        transition: all 0.3s var(--ease-out-expo);
    }

    .btn-end-call-lg {
        width: 85px; height: 85px;
        background: var(--error-red);
        border: none; border-radius: 50%;
        color: white; font-size: 32px;
        box-shadow: 0 15px 30px rgba(255, 59, 48, 0.4);
        transition: transform 0.2s ease;
    }

    .btn-end-call-lg:active { transform: scale(0.9); }
</style>
