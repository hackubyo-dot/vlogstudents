<!-- CSS NUCLEAR: ECONOMY DASHBOARD FIDELITY -->
<style>
    #economy-orchestrator { background: #000; position: relative; }
    
    .economy-ambient-glow {
        position: fixed; top: -20%; left: -10%; width: 60vw; height: 60vw;
        background: radial-gradient(circle, rgba(0, 230, 118, 0.04) 0%, transparent 70%);
        z-index: 0; pointer-events: none;
    }

    /* MASTER CARD E XP RING */
    .economy-master-card { background: rgba(255, 255, 255, 0.02); z-index: 1; }
    
    .xp-ring-container { width: 220px; height: 220px; position: relative; }
    
    .xp-ring-outer {
        width: 100%; height: 100%; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: conic-gradient(var(--emerald-green) 0%, rgba(255,255,255,0.05) 0%);
        transition: background 1.5s var(--ease-out-expo);
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .xp-ring-inner {
        width: calc(100% - 30px); height: calc(100% - 30px);
        background: #000; border-radius: 50%;
    }

    .text-emerald { color: #00E676 !important; }
    .tier-badge-pill { background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.2); }

    /* ACTION BUTTONS */
    .btn-economy-hub { transition: all 0.3s var(--ease-out-expo); text-align: left; }
    .btn-economy-hub:hover { transform: translateY(-5px); background: rgba(255,255,255,0.06); border-color: var(--emerald-green); }
    
    .action-icon {
        width: 60px; height: 60px; border-radius: 20px;
        display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .bg-emerald-glow { background: rgba(0, 230, 118, 0.1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.1); }
    .bg-purple-glow { background: rgba(138, 43, 226, 0.1); box-shadow: 0 0 20px rgba(138, 43, 226, 0.1); }

    /* RANKING TABS */
    .tab-pill-box { background: rgba(255, 255, 255, 0.05); }
    .tab-pill-btn {
        border: none; background: transparent; color: rgba(255, 255, 255, 0.3);
        padding: 8px 18px; font-weight: 900; font-size: 10px; border-radius: 30px;
        transition: all 0.3s ease;
    }
    .tab-pill-btn.active { background: #fff; color: #000; }

    /* MINING VAULT */
    .mining-vault { background: rgba(255, 255, 255, 0.01); }
    .transaction-tile {
        padding: 15px; border-radius: 16px; background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.2s ease;
    }
    .transaction-tile:hover { background: rgba(255, 255, 255, 0.04); transform: scale(1.01); }

    /* CUSTOM SCROLLBAR */
    .no-scrollbar::-webkit-scrollbar { display: none; }
</style>

<!-- JS KERNEL: ECONOMY ORCHESTRATION -->
<script>
    const VlogPointsView = {
        init() {
            console.log("%c[ECONOMY] Hub Financeiro Online. Sincronizando...", "color: #00E676; font-weight: bold;");
            
            if (window.VlogPoints) {
                window.VlogPoints.init();
                this._startUIPolling();
            }
            this._setupTabSwitching();
        },

        /**
         * Monitora o estado do Módulo Points para atualizar a UI em tempo real
         */
        _startUIPolling() {
            const updateUI = () => {
                const progress = window.VlogPoints.calculateXPProgress();
                const ring = document.getElementById('xp-dynamic-ring');
                const tier = window.VlogPoints.getCurrentTier();

                if (ring) {
                    ring.style.background = `conic-gradient(${tier.color} ${progress}%, rgba(255,255,255,0.05) 0deg)`;
                }
            };

            // Polling de sincronia visual (latência zero de renderização)
            const poller = setInterval(() => {
                if (window.VlogPoints._balance > 0) {
                    updateUI();
                    clearInterval(poller);
                }
            }, 500);
        },

        _setupTabSwitching() {
            const btns = document.querySelectorAll('.tab-pill-btn');
            btns.forEach(btn => {
                btn.onclick = () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    window.VlogPoints._activeTab = btn.dataset.rank;
                    window.VlogPoints._renderLeaderboard();
                    if ("vibrate" in navigator) navigator.vibrate(10);
                };
            });
        },

        openMarketplace() {
            const modal = document.getElementById('market-modal');
            modal.classList.remove('d-none');
            modal.classList.add('animate__slideInUp');
        },

        copyReferral() {
            window.VlogPoints.shareInvite();
        },

        showEconomicInfo() {
            window.VlogMain._showToast("Suas Voices são mineradas através de interações acadêmicas reais.", "info");
        }
    };

    // Auto-execução
    VlogPointsView.init();
</script>
